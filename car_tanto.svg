<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 510" width="750" height="510">
<defs>
  <!-- Apricot Candy Metallic T18 -->
  <linearGradient id="tSide" x1="0" y1="70" x2="0" y2="365" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#F5B488"/>
    <stop offset="22%"  stop-color="#EA9870"/>
    <stop offset="68%"  stop-color="#D67848"/>
    <stop offset="100%" stop-color="#C46030"/>
  </linearGradient>
  <linearGradient id="tFront" x1="55" y1="0" x2="115" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#E09060"/>
    <stop offset="100%" stop-color="#C06838"/>
  </linearGradient>
  <linearGradient id="tRoof" x1="55" y1="0" x2="645" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#E8A070"/>
    <stop offset="100%" stop-color="#D08050"/>
  </linearGradient>
  <linearGradient id="tGlass" x1="0" y1="73" x2="0" y2="272" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#BDD8F0"/>
    <stop offset="100%" stop-color="#7AACC5"/>
  </linearGradient>
  <linearGradient id="tGlassF" x1="55" y1="0" x2="115" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#C8E0F4"/>
    <stop offset="100%" stop-color="#88BCD8"/>
  </linearGradient>
  <radialGradient id="tTire" cx="38%" cy="35%" r="68%">
    <stop offset="0%"   stop-color="#555"/>
    <stop offset="55%"  stop-color="#222"/>
    <stop offset="100%" stop-color="#111"/>
  </radialGradient>
  <radialGradient id="tHub" cx="38%" cy="33%" r="65%">
    <stop offset="0%"   stop-color="#e8e8e8"/>
    <stop offset="55%"  stop-color="#bbb"/>
    <stop offset="100%" stop-color="#888"/>
  </radialGradient>
  <linearGradient id="tBump" x1="0" y1="355" x2="0" y2="425" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#DDA07A"/>
    <stop offset="100%" stop-color="#B05030"/>
  </linearGradient>
  <linearGradient id="tShine" x1="0" y1="70" x2="0" y2="130" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="rgba(255,255,255,0.55)"/>
    <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
  </linearGradient>
</defs>

<!-- Ground shadow -->
<ellipse cx="375" cy="497" rx="285" ry="13" fill="rgba(0,0,0,0.2)"/>

<!-- ── REAR WHEEL ── -->
<circle cx="545" cy="415" r="72" fill="#111"/>
<circle cx="545" cy="415" r="63" fill="url(#tTire)"/>
<circle cx="545" cy="415" r="45" fill="#181818"/>
<circle cx="545" cy="415" r="29" fill="url(#tHub)"/>
<g stroke="#ccc" stroke-width="5.5">
  <line x1="545" y1="388" x2="545" y2="442"/>
  <line x1="518" y1="415" x2="572" y2="415"/>
  <line x1="526" y1="394" x2="564" y2="436"/>
  <line x1="564" y1="394" x2="526" y2="436"/>
</g>
<circle cx="545" cy="415" r="8" fill="#ccc"/>

<!-- ── FRONT WHEEL ── -->
<circle cx="162" cy="415" r="72" fill="#111"/>
<circle cx="162" cy="415" r="63" fill="url(#tTire)"/>
<circle cx="162" cy="415" r="45" fill="#181818"/>
<circle cx="162" cy="415" r="29" fill="url(#tHub)"/>
<g stroke="#ccc" stroke-width="5.5">
  <line x1="162" y1="388" x2="162" y2="442"/>
  <line x1="135" y1="415" x2="189" y2="415"/>
  <line x1="143" y1="394" x2="181" y2="436"/>
  <line x1="181" y1="394" x2="143" y2="436"/>
</g>
<circle cx="162" cy="415" r="8" fill="#ccc"/>

<!-- ── SIDE BODY (with wheel arch cutouts) ── -->
<path d="M115,70 L645,70 L645,365 L620,365 Q545,290 470,365 L237,365 Q162,290 115,365 Z"
  fill="url(#tSide)"/>

<!-- ── FRONT FACE (angled) ── -->
<path d="M55,90 L115,70 L115,365 Q85,375 55,388 Z" fill="url(#tFront)"/>

<!-- ── ROOF (top strip, slight perspective) ── -->
<path d="M55,90 L115,70 L645,70 L618,86 Z" fill="url(#tRoof)"/>

<!-- ── WINDOW BASE BAR ── -->
<rect x="115" y="70" width="530" height="7" rx="1" fill="#2a2a2a"/>

<!-- ── A-PILLAR ── -->
<rect x="115" y="70" width="36" height="205" fill="#222"/>

<!-- ── FRONT DOOR WINDOW ── -->
<path d="M153,73 L153,272 L294,272 L294,73 Z" fill="url(#tGlass)"/>
<path d="M156,76 L168,76 L168,195 L156,195 Z" fill="rgba(255,255,255,0.44)"/>

<!-- ── B-PILLAR ── -->
<rect x="294" y="70" width="16" height="205" fill="#252525"/>

<!-- ── CENTER DOOR WINDOW ── -->
<path d="M312,73 L312,272 L447,272 L447,73 Z" fill="url(#tGlass)"/>
<path d="M315,76 L325,76 L325,195 L315,195 Z" fill="rgba(255,255,255,0.35)"/>

<!-- ── C-PILLAR ── -->
<rect x="447" y="70" width="16" height="205" fill="#252525"/>

<!-- ── REAR QUARTER WINDOW ── -->
<path d="M465,73 L465,272 L592,272 L592,73 Z" fill="url(#tGlass)"/>
<path d="M468,76 L477,76 L477,188 L468,188 Z" fill="rgba(255,255,255,0.3)"/>

<!-- ── D-PILLAR / REAR ── -->
<rect x="592" y="70" width="53" height="205" fill="#222"/>
<!-- Rear window on D-pillar -->
<path d="M595,73 L642,73 L642,268 L595,268 Z" fill="url(#tGlass)" opacity="0.85"/>

<!-- ── WINDSHIELD (on front angled face) ── -->
<path d="M59,100 L112,77 L112,268 L59,290 Z" fill="url(#tGlassF)" opacity="0.92"/>
<path d="M62,103 L73,98 L73,210 L62,214 Z" fill="rgba(255,255,255,0.42)"/>

<!-- ── HEADLIGHTS ── -->
<!-- Far headlight (right, smaller due to perspective) -->
<rect x="108" y="278" width="10" height="46" rx="2" fill="#F8F8F4"/>
<rect x="109" y="280" width="8"  height="42" rx="1" fill="#D5E8F5"/>
<!-- Far turn signal -->
<rect x="108" y="324" width="10" height="14" rx="2" fill="#FFD058"/>

<!-- Near headlight (left/driver side, larger) -->
<path d="M55,272 L106,266 L106,328 L55,334 Z" fill="#F8F8F4" rx="3"/>
<path d="M57,274 L104,269 L104,326 L57,331 Z" fill="#D4E6F5"/>
<ellipse cx="77" cy="298" rx="9" ry="13" fill="rgba(210,226,252,0.92)"/>
<ellipse cx="77" cy="298" rx="4"  ry="6"  fill="rgba(185,210,248,0.95)"/>
<!-- Near turn signal -->
<path d="M55,334 L106,328 L106,344 L55,350 Z" fill="#FFD058"/>

<!-- ── GRILLE ── -->
<path d="M55,348 L105,342 L105,362 L55,368 Z" fill="#1a1a1a"/>
<line x1="57" y1="350" x2="103" y2="345" stroke="#444" stroke-width="1.5"/>
<line x1="57" y1="354" x2="103" y2="349" stroke="#444" stroke-width="1.5"/>
<line x1="57" y1="358" x2="103" y2="353" stroke="#444" stroke-width="1.5"/>
<!-- Daihatsu badge -->
<ellipse cx="72" cy="353" rx="6.5" ry="7"   fill="#666"/>
<ellipse cx="72" cy="353" rx="4"   ry="4.5"  fill="#444"/>

<!-- ── FRONT BUMPER ── -->
<path d="M48,365 L112,355 L112,420 L48,430 Z" fill="url(#tBump)"/>
<!-- Lower black strip -->
<path d="M50,414 L110,405 L110,424 L50,433 Z" fill="#2a2a2a" opacity="0.9"/>
<!-- Fog light -->
<rect x="56" y="386" width="18" height="11" rx="3" fill="#DDE8E0" opacity="0.75"/>

<!-- ── REAR BUMPER ── -->
<rect x="620" y="365" width="25" height="50" rx="3" fill="#CC7040"/>
<rect x="622" y="400" width="21" height="17" rx="3" fill="#2a2a2a" opacity="0.8"/>

<!-- ── ROCKER SILL ── -->
<rect x="152" y="340" width="468" height="14" rx="2" fill="#A84820"/>
<!-- Front sill -->
<path d="M60,378 L115,355 L115,368 L65,392 Z" fill="#984018"/>

<!-- ── WHEEL ARCH TRIM ── -->
<path d="M115,365 Q162,290 237,365" fill="none" stroke="#A84820" stroke-width="3.5"/>
<path d="M470,365 Q545,290 620,365" fill="none" stroke="#A84820" stroke-width="3.5"/>

<!-- ── DOOR LINE ── -->
<line x1="153" y1="274" x2="592" y2="274" stroke="#B85828" stroke-width="1.5" opacity="0.7"/>

<!-- ── DOOR HANDLES ── -->
<rect x="232" y="210" width="30" height="8" rx="4" fill="#E0D0C0" stroke="#C8B8A8" stroke-width="0.8"/>
<rect x="382" y="210" width="30" height="8" rx="4" fill="#E0D0C0" stroke="#C8B8A8" stroke-width="0.8"/>

<!-- ── SIDE MIRROR ── -->
<path d="M115,154 L89,148 L83,170 L115,176 Z" fill="#DA8558" stroke="#C06838" stroke-width="1"/>
<path d="M86,151 L113,156 L113,174 L86,169 Z" fill="#444" opacity="0.85"/>

<!-- ── BODY HIGHLIGHTS (metallic shine) ── -->
<path d="M119,72 L641,72 L641,118 L119,118 Z" fill="url(#tShine)" opacity="0.85"/>
<rect x="119" y="72" width="522" height="13" rx="1" fill="rgba(255,255,255,0.5)" opacity="0.8"/>
<!-- Mid subtle highlight -->
<rect x="119" y="182" width="522" height="18" rx="1" fill="rgba(255,255,255,0.1)"/>
<!-- Front face highlight -->
<path d="M58,93 L112,72 L112,120 L58,138 Z" fill="rgba(255,255,255,0.25)"/>
<!-- Roof edge highlight -->
<path d="M57,90 L115,70 L645,70 L617,82 L115,82 L63,100 Z" fill="rgba(255,255,255,0.18)"/>

<!-- ── ROOF EDGE TRIM ── -->
<line x1="115" y1="70" x2="645" y2="70" stroke="#A04020" stroke-width="2.5"/>

<!-- ── LICENSE PLATE (front) ── -->
<rect x="59" y="375" width="36" height="24" rx="2" fill="#FFFFD0" stroke="#888" stroke-width="0.8"/>
<text x="61" y="382" font-size="4"   fill="#333" font-family="Arial,sans-serif">沖縄581</text>
<text x="61" y="393" font-size="6.2" fill="#111" font-family="Arial,sans-serif" font-weight="bold">よ95-24</text>

</svg>
