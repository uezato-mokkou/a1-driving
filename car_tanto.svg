<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 500" width="750" height="500">
<defs>
  <!-- Apricot Candy Metallic T18 -->
  <linearGradient id="body" x1="0" y1="80" x2="0" y2="360" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#F8B888"/>
    <stop offset="35%"  stop-color="#EC9868"/>
    <stop offset="80%"  stop-color="#D47040"/>
    <stop offset="100%" stop-color="#BE5A28"/>
  </linearGradient>
  <linearGradient id="front" x1="560" y1="0" x2="710" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#E89060"/>
    <stop offset="100%" stop-color="#B85030"/>
  </linearGradient>
  <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#F0A870"/>
    <stop offset="100%" stop-color="#D07840"/>
  </linearGradient>
  <linearGradient id="glass" x1="0" y1="90" x2="0" y2="245" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#C8E4F8" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#84B8D8" stop-opacity="0.9"/>
  </linearGradient>
  <linearGradient id="wshield" x1="560" y1="100" x2="708" y2="100" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="#D0E8FA"/>
    <stop offset="100%" stop-color="#88C0DE"/>
  </linearGradient>
  <radialGradient id="tire" cx="40%" cy="35%" r="65%">
    <stop offset="0%"   stop-color="#606060"/>
    <stop offset="50%"  stop-color="#282828"/>
    <stop offset="100%" stop-color="#111"/>
  </radialGradient>
  <radialGradient id="rim" cx="40%" cy="34%" r="62%">
    <stop offset="0%"   stop-color="#e0e0e0"/>
    <stop offset="55%"  stop-color="#b0b0b0"/>
    <stop offset="100%" stop-color="#808080"/>
  </radialGradient>
  <linearGradient id="shine" x1="0" y1="80" x2="0" y2="150" gradientUnits="userSpaceOnUse">
    <stop offset="0%"   stop-color="rgba(255,255,255,0.62)"/>
    <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
  </linearGradient>
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="130%">
    <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="rgba(0,0,0,0.28)"/>
  </filter>
</defs>

<!-- Ground shadow -->
<ellipse cx="370" cy="488" rx="295" ry="13" fill="rgba(0,0,0,0.18)"/>

<!-- ══ WHEELS (behind body) ══ -->
<!-- Rear -->
<circle cx="160" cy="400" r="78" fill="#111"/>
<circle cx="160" cy="400" r="67" fill="url(#tire)"/>
<circle cx="160" cy="400" r="48" fill="#1a1a1a"/>
<circle cx="160" cy="400" r="32" fill="url(#rim)"/>
<g stroke="#d8d8d8" stroke-width="6" stroke-linecap="round">
  <line x1="160" y1="370" x2="160" y2="430"/>
  <line x1="130" y1="400" x2="190" y2="400"/>
  <line x1="139" y1="379" x2="181" y2="421"/>
  <line x1="181" y1="379" x2="139" y2="421"/>
</g>
<circle cx="160" cy="400" r="10" fill="#d0d0d0"/>
<!-- Front -->
<circle cx="530" cy="400" r="78" fill="#111"/>
<circle cx="530" cy="400" r="67" fill="url(#tire)"/>
<circle cx="530" cy="400" r="48" fill="#1a1a1a"/>
<circle cx="530" cy="400" r="32" fill="url(#rim)"/>
<g stroke="#d8d8d8" stroke-width="6" stroke-linecap="round">
  <line x1="530" y1="370" x2="530" y2="430"/>
  <line x1="500" y1="400" x2="560" y2="400"/>
  <line x1="509" y1="379" x2="551" y2="421"/>
  <line x1="551" y1="379" x2="509" y2="421"/>
</g>
<circle cx="530" cy="400" r="10" fill="#d0d0d0"/>

<!-- ══ MAIN BODY ══ -->
<g filter="url(#shadow)">

<!-- Side body — tall boxy shape with rounded corners and wheel arch cutouts -->
<path d="
  M 100,80
  Q 100,72 110,72
  L 558,72
  Q 568,72 568,80
  L 568,325
  Q 568,330 568,330
  L 455,330 Q 455,322 530,322 Q 605,322 605,330
  L 605,330 Q 605,325 600,330
  L 455,330
  Q 455,310 530,310 Q 608,310 608,330
  L 608,366
  Q 565,300 530,300 Q 460,300 455,366
  L 232,366
  Q 228,300 160,300 Q 94,300 90,366
  L 88,330
  Q 100,330 100,322 Z"
  fill="none"/>

<!-- Simplified body path with arch cutouts -->
<path d="M100,80 Q100,70 112,70 L556,70 Q568,70 568,80
  L568,366 L608,366
  Q608,304 530,304 Q452,304 452,366
  L234,366
  Q234,304 160,304 Q86,304 86,366
  L86,80 Q86,70 100,70 Z"
  fill="url(#body)" stroke="#A84820" stroke-width="2"/>

<!-- Front angled face — wider, more visible -->
<path d="M568,70 L710,100 L710,388 Q640,370 568,366 L568,70 Z"
  fill="url(#front)" stroke="#A84820" stroke-width="2"/>

<!-- Roof top strip -->
<path d="M100,70 Q112,60 160,60 L556,60 Q580,60 568,70 L710,100 L690,90 Z"
  fill="url(#roof)" stroke="#A04020" stroke-width="1.5"/>

<!-- ══ WINDOWS on side ══ -->
<!-- Window chrome bar top -->
<rect x="112" y="70" width="456" height="8" rx="2" fill="#333"/>

<!-- D-pillar (rear) -->
<rect x="86"  y="72" width="46"  height="174" rx="4" fill="#222"/>

<!-- Rear quarter window (1 of 3) -->
<path d="M134,75 L134,242 L252,242 L252,75 Z" rx="3" fill="url(#glass)"/>
<rect x="137" y="78" width="14" height="90" rx="3" fill="rgba(255,255,255,0.38)"/>

<!-- C-pillar -->
<rect x="252" y="70" width="18" height="178" fill="#2a2a2a"/>

<!-- Center door window (2 of 3) -->
<path d="M272,75 L272,242 L390,242 L390,75 Z" rx="3" fill="url(#glass)"/>
<rect x="275" y="78" width="14" height="90" rx="3" fill="rgba(255,255,255,0.38)"/>

<!-- B-pillar -->
<rect x="390" y="70" width="18" height="178" fill="#2a2a2a"/>

<!-- Front door window (3 of 3, largest — near A-pillar) -->
<path d="M410,75 L410,242 L556,242 L556,75 Z" rx="3" fill="url(#glass)"/>
<rect x="413" y="78" width="16" height="90" rx="3" fill="rgba(255,255,255,0.44)"/>

<!-- A-pillar (front, thin) -->
<rect x="556" y="70" width="12" height="178" fill="#222"/>

<!-- ══ WINDSHIELD (front face) ══ -->
<path d="M572,105 L704,132 L704,258 L572,250 Z"
  fill="url(#wshield)" opacity="0.93" rx="3"/>
<rect x="574" y="108" width="16" height="120" rx="3" fill="rgba(255,255,255,0.42)"/>

<!-- ══ LOWER BODY PANEL ══ -->
<!-- Belt line -->
<line x1="134" y1="245" x2="556" y2="245" stroke="#C06828" stroke-width="2" opacity="0.7"/>

<!-- ══ HEADLIGHTS ══ -->
<!-- Near (large) headlight — left side of front face + wraps to side -->
<path d="M554,250 L672,257 L672,318 L554,314 Z" rx="6" fill="#F6F6F0"/>
<path d="M556,253 L669,259 L669,315 L556,311 Z" rx="5" fill="#D0E8F8"/>
<!-- Headlight lens rings -->
<ellipse cx="588" cy="284" rx="14" ry="18" fill="rgba(200,224,252,0.88)"/>
<ellipse cx="588" cy="284" rx="7"  ry="9"  fill="rgba(180,212,252,0.95)"/>
<ellipse cx="635" cy="287" rx="12" ry="16" fill="rgba(200,224,252,0.8)"/>
<ellipse cx="635" cy="287" rx="6"  ry="8"  fill="rgba(180,212,252,0.9)"/>
<!-- Near turn signal -->
<path d="M554,314 L672,318 L672,334 L554,330 Z" rx="3" fill="#FFCC44"/>

<!-- Far headlight (right edge of front face) -->
<rect x="676" y="264" width="30" height="46" rx="5" fill="#F4F4EE"/>
<rect x="677" y="266" width="28" height="42" rx="4" fill="#CDE4F6"/>
<ellipse cx="691" cy="287" rx="6"  ry="8"  fill="rgba(205,228,252,0.9)"/>
<!-- Far turn signal -->
<rect x="676" y="310" width="30" height="14" rx="4" fill="#FFCC44"/>

<!-- ══ GRILLE ══ -->
<path d="M556,336 L706,342 L706,364 L556,358 Z" rx="3" fill="#1c1c1c"/>
<path d="M558,344 L704,349" stroke="#555" stroke-width="2"/>
<path d="M558,350 L704,355" stroke="#555" stroke-width="2"/>
<path d="M558,356 L704,361" stroke="#555" stroke-width="2"/>
<!-- Daihatsu D badge -->
<ellipse cx="630" cy="351" rx="11" ry="10" fill="#777" stroke="#999" stroke-width="1"/>
<ellipse cx="630" cy="351" rx="7"  ry="6"  fill="#555"/>
<text x="626" y="355" font-size="10" fill="#ccc" font-family="Arial" font-weight="bold">D</text>

<!-- ══ BUMPER ══ -->
<path d="M548,365 L710,370 L710,428 Q665,416 548,420 Z" rx="6"
  fill="#C87855" stroke="#A84820" stroke-width="1.5"/>
<path d="M550,416 L708,420 L708,432 L550,428 Z" rx="3" fill="#2a2a2a" opacity="0.85"/>
<!-- Fog light -->
<rect x="558" y="384" width="22" height="14" rx="4" fill="#DDE8DC" opacity="0.85"/>
<rect x="560" y="386" width="18" height="10" rx="3" fill="#E8F2E8" opacity="0.7"/>

<!-- Rear bumper strip -->
<rect x="86"  y="366" width="20" height="44" rx="4" fill="#C07040" stroke="#A84820" stroke-width="1.5"/>

<!-- ══ ROCKER SILL ══ -->
<rect x="132" y="326" width="422" height="14" rx="3" fill="#A84820"/>
<path d="M86,366 L132,328 L132,342 L90,378 Z" fill="#984018"/>

<!-- ══ WHEEL ARCH TRIM ══ -->
<path d="M86,366  Q160,304 234,366" fill="none" stroke="#A84820" stroke-width="4"/>
<path d="M452,366 Q530,304 608,366" fill="none" stroke="#A84820" stroke-width="4"/>

<!-- ══ DOOR HANDLES ══ -->
<rect x="332" y="210" width="32" height="9" rx="4.5" fill="#E0D0BE" stroke="#C8B8A8" stroke-width="1"/>
<rect x="476" y="210" width="32" height="9" rx="4.5" fill="#E0D0BE" stroke="#C8B8A8" stroke-width="1"/>

<!-- ══ SIDE MIRROR ══ -->
<path d="M568,148 L600,143 L605,167 L568,172 Z" rx="4"
  fill="#D88055" stroke="#C06835" stroke-width="1.5"/>
<rect x="571" y="146" width="31" height="24" rx="4" fill="#3a3a3a" opacity="0.85"/>

<!-- ══ BODY HIGHLIGHTS (metallic shine) ══ -->
<path d="M104,72 L556,72 L556,130 L104,130 Z" fill="url(#shine)" opacity="0.85"/>
<rect x="104" y="72" width="452" height="14" rx="2" fill="rgba(255,255,255,0.50)" opacity="0.78"/>
<!-- Mid body subtle shine -->
<rect x="134" y="172" width="420" height="14" rx="2" fill="rgba(255,255,255,0.12)"/>
<!-- Front face highlight -->
<path d="M572,103 L707,132 L707,162 L572,134 Z" fill="rgba(255,255,255,0.2)"/>
<!-- Roof highlight -->
<path d="M112,70 L556,70 L710,100 L686,90 L556,80 L112,80 Z" fill="rgba(255,255,255,0.2)"/>

<!-- Roof trim edge -->
<line x1="86"  y1="70"  x2="568" y2="70"  stroke="#9A3E18" stroke-width="2.5"/>
<line x1="568" y1="70"  x2="710" y2="100" stroke="#9A3E18" stroke-width="2"/>

</g><!-- end shadow group -->

<!-- ══ LICENSE PLATE ══ -->
<rect x="620" y="370" width="48" height="30" rx="3" fill="#FFFFD0" stroke="#999" stroke-width="1"/>
<text x="622" y="380" font-size="5"   fill="#333" font-family="Arial,sans-serif">沖縄581</text>
<text x="622" y="394" font-size="8"   fill="#111" font-family="Arial,sans-serif" font-weight="bold">よ95-24</text>

</svg>
