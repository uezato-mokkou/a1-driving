<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>石垣島運転代行 管理画面</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --accent: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --line: #06c755;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--card);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--accent);
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 700; }
    .conn-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .conn-ok  { background: rgba(34,197,94,0.2);  color: var(--green); }
    .conn-err { background: rgba(239,68,68,0.2);   color: var(--red); }
    .conn-off { background: rgba(148,163,184,0.15); color: var(--muted); }

    /* マップ */
    #map {
      flex: 1;
      min-height: 0;
      z-index: 0;
    }

    /* 車両パネル */
    .vehicle-panels {
      display: flex;
      gap: 8px;
      padding: 8px;
      background: var(--bg);
      flex-shrink: 0;
    }
    .vehicle-card {
      flex: 1;
      background: var(--card);
      border-radius: 10px;
      padding: 10px 12px;
      border: 2px solid var(--border);
      transition: border-color 0.3s;
    }
    .vehicle-card.driving { border-color: var(--green); }
    .vehicle-card.departing { border-color: var(--yellow); }

    .vc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .vc-name { font-size: 15px; font-weight: 800; }
    .vc-status {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 700;
    }
    .st-waiting   { background: rgba(148,163,184,0.2); color: var(--muted); }
    .st-driving   { background: rgba(34,197,94,0.2);   color: var(--green); }
    .st-departing { background: rgba(245,158,11,0.2);  color: var(--yellow); }

    .vc-info { font-size: 12px; color: var(--muted); line-height: 1.8; }
    .vc-info span { color: var(--text); font-weight: 600; }

    .vc-metrics {
      display: flex;
      gap: 8px;
      margin: 8px 0;
    }
    .vc-metric {
      flex: 1;
      background: var(--bg);
      border-radius: 6px;
      padding: 6px 8px;
      text-align: center;
    }
    .vc-metric .val { font-size: 18px; font-weight: 800; }
    .vc-metric .lbl { font-size: 10px; color: var(--muted); }

    .btn-line {
      display: block;
      width: 100%;
      padding: 8px;
      background: var(--line);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-line:active { opacity: 0.8; }
    .btn-line:disabled { opacity: 0.35; }

    .updated { font-size: 10px; color: var(--muted); text-align: right; margin-top: 4px; }

    /* 乗務記録テーブル */
    .rides-panel {
      background: var(--bg);
      padding: 8px;
      flex-shrink: 0;
    }
    .rides-title {
      font-size: 11px; color: var(--muted); font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      padding: 4px 8px 8px;
    }
    .rides-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
    .rides-tab {
      padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
      cursor: pointer; border: 1px solid var(--border); background: var(--card);
      color: var(--muted); touch-action: manipulation;
    }
    .rides-tab.active-a { border-color: #3b82f6; color: #3b82f6; background: rgba(59,130,246,.15); }
    .rides-tab.active-b { border-color: #a855f7; color: #a855f7; background: rgba(168,85,247,.15); }
    .rides-tab.active-c { border-color: #22c55e; color: #22c55e; background: rgba(34,197,94,.15); }
    .rides-wrap { overflow-x: auto; }
    .rides-wrap table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .rides-wrap th {
      background: var(--card); padding: 5px 6px; text-align: center;
      color: var(--muted); font-weight: 600; white-space: nowrap;
    }
    .rides-wrap td {
      padding: 7px 6px; border-bottom: 1px solid var(--border);
      text-align: center; vertical-align: middle; color: var(--text);
    }
    .rides-wrap tr:last-child td { border-bottom: none; }
    .rides-wrap td a { color: var(--accent); text-decoration: none; }
    .pay-cash     { color: var(--green); font-weight: 700; }
    .pay-cashless { color: #a855f7; font-weight: 700; }
    .rides-total {
      display: flex; gap: 8px; padding: 6px 4px;
      font-size: 12px; border-top: 1px solid var(--border); margin-top: 4px;
    }
    .rides-total span { color: var(--muted); }
    .rides-total b { color: var(--text); }

    /* Leafletカスタムアイコン */
    .car-marker {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .car-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .car-icon.car-a { background: #3b82f6; }
    .car-icon.car-b { background: #a855f7; }
    .car-icon.waiting { opacity: 0.5; }
    .car-label {
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      margin-top: 2px;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<header>
  <h1>🗺 石垣島運転代行 管理画面</h1>
  <span class="conn-badge conn-off" id="conn-badge">未接続</span>
</header>

<div id="map"></div>

<div class="vehicle-panels">
  <!-- 車A -->
  <div class="vehicle-card" id="card-a">
    <div class="vc-header">
      <div class="vc-name" style="color:#3b82f6">🚗 車A</div>
      <div class="vc-status st-waiting" id="status-a">待機中</div>
    </div>
    <div class="vc-metrics">
      <div class="vc-metric">
        <div class="val" id="dist-a">—</div>
        <div class="lbl">km</div>
      </div>
      <div class="vc-metric">
        <div class="val" id="fare-a">—</div>
        <div class="lbl">円</div>
      </div>
    </div>
    <div class="vc-info" id="info-a">お客様：—<br>目的地：—</div>
    <div class="updated" id="updated-a"></div>
    <button class="btn-line" style="margin-top:8px" onclick="sendLine('A')" id="line-btn-a">
      📱 車Aにテンプレ配車
    </button>
  </div>

  <!-- 車B -->
  <div class="vehicle-card" id="card-b">
    <div class="vc-header">
      <div class="vc-name" style="color:#a855f7">🚗 車B</div>
      <div class="vc-status st-waiting" id="status-b">待機中</div>
    </div>
    <div class="vc-metrics">
      <div class="vc-metric">
        <div class="val" id="dist-b">—</div>
        <div class="lbl">km</div>
      </div>
      <div class="vc-metric">
        <div class="val" id="fare-b">—</div>
        <div class="lbl">円</div>
      </div>
    </div>
    <div class="vc-info" id="info-b">お客様：—<br>目的地：—</div>
    <div class="updated" id="updated-b"></div>
    <button class="btn-line" style="margin-top:8px" onclick="sendLine('B')" id="line-btn-b">
      📱 車Bにテンプレ配車
    </button>
  </div>
</div>

<!-- 乗務記録パネル -->
<div class="rides-panel">
  <div class="rides-title">📋 本日の乗務記録</div>
  <div class="rides-tabs">
    <div class="rides-tab active-a" id="rtab-a" data-car="car_a">🚗 車A</div>
    <div class="rides-tab" id="rtab-b" data-car="car_b">🚗 車B</div>
    <div class="rides-tab" id="rtab-c" data-car="car_c">🚗 車C</div>
  </div>
  <div class="rides-wrap">
    <table>
      <thead>
        <tr><th>#</th><th>出発</th><th>出発地</th><th>到着</th><th>目的地</th><th>時間</th><th>距離</th><th>金額</th><th>支払</th></tr>
      </thead>
      <tbody id="rides-tbody">
        <tr><td colspan="9" style="color:var(--muted);padding:16px">記録なし</td></tr>
      </tbody>
    </table>
  </div>
  <div class="rides-total" id="rides-total" style="display:none">
    <span>合計：</span><b id="rt-total">¥0</b>
    &nbsp;|&nbsp;<span>現金：</span><b id="rt-cash" style="color:var(--green)">¥0</b>
    &nbsp;|&nbsp;<span>カード等：</span><b id="rt-cashless" style="color:#a855f7">¥0</b>
    &nbsp;|&nbsp;<span>歩合30%：</span><b id="rt-comm" style="color:var(--yellow)">¥0</b>
  </div>
</div>

<script>
// ================================================
// ★ Supabase設定（staff_gps_app.htmlと同じ値を入力）
// ================================================
const SUPABASE_URL      = 'https://mfkqpsmfteiolgeqgnfx.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_NV_AQykUo40ReFLWAuYoHQ_9m-Sn_ql';

// ================================================
// 石垣島の中心座標
// ================================================
const ISHIGAKI_CENTER = [24.3336, 124.1543];

// ================================================
// マップ初期化
// ================================================
const map = L.map('map', {
  center: ISHIGAKI_CENTER,
  zoom: 12,
  zoomControl: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

// ================================================
// 車両マーカー
// ================================================
function makeIcon(car, status) {
  const color = car === 'A' ? '#3b82f6' : '#a855f7';
  const opacity = status === 'waiting' ? '0.5' : '1';
  const label = status === 'driving' ? '走行中' : status === 'departing' ? '出発' : '待機';
  return L.divIcon({
    className: '',
    html: `<div style="display:flex;flex-direction:column;align-items:center">
      <div style="width:40px;height:40px;border-radius:50%;background:${color};opacity:${opacity};
        display:flex;align-items:center;justify-content:center;font-size:20px;
        border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5)">🚗</div>
      <div style="background:rgba(0,0,0,0.75);color:#fff;font-size:11px;font-weight:700;
        padding:2px 6px;border-radius:4px;margin-top:2px;white-space:nowrap">
        車${car}・${label}</div>
    </div>`,
    iconSize: [60, 60],
    iconAnchor: [30, 20]
  });
}

const markers = {
  A: L.marker(ISHIGAKI_CENTER, { icon: makeIcon('A', 'waiting') }).addTo(map),
  B: L.marker([24.3400, 124.1600], { icon: makeIcon('B', 'waiting') }).addTo(map)
};

// ================================================
// 車両データ
// ================================================
const vehicles = { A: {}, B: {} };

function getKey(id) {
  if (id === 'car_a') return 'A';
  if (id === 'car_b') return 'B';
  return null;
}

// ================================================
// UI更新
// ================================================
function updateCard(key, data) {
  vehicles[key] = data;

  const status   = data.status || 'waiting';
  const dist     = data.distance != null ? parseFloat(data.distance).toFixed(2) : '—';
  const fare     = data.fare     != null ? parseInt(data.fare).toLocaleString()  : '—';
  const customer = data.customer_name || '—';
  const dest     = data.destination   || '—';
  const updatedAt = data.updated_at
    ? new Date(data.updated_at).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit', second:'2-digit'})
    : '';

  const stMap = {
    waiting:   ['待機中',   'st-waiting'],
    departing: ['出発',     'st-departing'],
    driving:   ['走行中',   'st-driving']
  };
  const [stLabel, stClass] = stMap[status] || ['不明', 'st-waiting'];

  const lk = key.toLowerCase();
  document.getElementById(`status-${lk}`).textContent  = stLabel;
  document.getElementById(`status-${lk}`).className    = `vc-status ${stClass}`;
  document.getElementById(`dist-${lk}`).textContent    = dist;
  document.getElementById(`fare-${lk}`).textContent    = fare;
  document.getElementById(`info-${lk}`).innerHTML      =
    `お客様：<span>${customer}</span><br>目的地：<span>${dest}</span>`;
  document.getElementById(`updated-${lk}`).textContent = updatedAt ? `更新 ${updatedAt}` : '';

  const card = document.getElementById(`card-${lk}`);
  card.classList.remove('driving', 'departing');
  if (status === 'driving')   card.classList.add('driving');
  if (status === 'departing') card.classList.add('departing');

  // マーカー更新
  if (data.lat && data.lng) {
    markers[key].setLatLng([data.lat, data.lng]);
    markers[key].setIcon(makeIcon(key, status));
  } else {
    markers[key].setIcon(makeIcon(key, status));
  }
}

// ================================================
// LINE配車テンプレ
// ================================================
function sendLine(car) {
  const time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
  const msg  = `【配車依頼】車${car}\n次のお客様の対応をお願いします。\n場所：\n時刻：${time}`;
  window.open(`https://line.me/R/msg/text/${encodeURIComponent(msg)}`, '_blank');
}

// ================================================
// ================================================
// Supabase接続・5秒ポーリング（plain fetch）
// ================================================
async function fetchVehicles() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/vehicles?select=*', {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
      }
    });
    if (!res.ok) throw new Error('fetch error');
    const data = await res.json();
    data.forEach(row => {
      const key = getKey(row.id);
      if (key) updateCard(key, row);
    });
    document.getElementById('conn-badge').textContent = '接続中 🟢';
    document.getElementById('conn-badge').className   = 'conn-badge conn-ok';
  } catch(e) {
    document.getElementById('conn-badge').textContent = '接続エラー';
    document.getElementById('conn-badge').className   = 'conn-badge conn-err';
  }
}

// ================================================
// 乗務記録フェッチ
// ================================================
let activeRideTab = 'car_a';
const todayStr = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'})
  .replace(/\//g,'-');
// ISO形式に変換
const todayISO = (() => {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd= String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
})();

async function fetchTodayRides(carId) {
  try {
    const url = SUPABASE_URL + `/rest/v1/rides?car_id=eq.${carId}&date=eq.${todayISO}&order=created_at.asc`;
    const res = await fetch(url, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
    });
    if (!res.ok) return;
    const data = await res.json();
    renderRidesTable(data);
  } catch(e) {}
}

function renderRidesTable(rides) {
  const tbody = document.getElementById('rides-tbody');
  const totalEl = document.getElementById('rides-total');
  if (!rides || rides.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" style="color:var(--muted);padding:16px">記録なし</td></tr>';
    totalEl.style.display = 'none';
    return;
  }
  let total = 0, cash = 0, cashless = 0;
  tbody.innerHTML = rides.map((r, i) => {
    const fare = r.fare || 0;
    total += fare;
    if (r.payment_type === 'cash') cash += fare; else cashless += fare;
    const payClass = r.payment_type === 'cash' ? 'pay-cash' : 'pay-cashless';
    const payLabel = r.payment_type === 'cash' ? '現金' : 'カード等';
    const dist = r.distance > 0 ? parseFloat(r.distance).toFixed(1)+'km' : '—';
    const dur  = r.duration_min > 0 ? r.duration_min+'分' : '—';
    const destLabel = r.arrival_place || r.destination || '—';
    const destUrl   = (r.arrival_lat && r.arrival_lng)
      ? `https://maps.google.com/?q=${r.arrival_lat},${r.arrival_lng}`
      : `https://maps.google.com/?q=${encodeURIComponent('石垣島 '+(r.destination||''))}`;
    const destCell = destLabel !== '—' ? `<a href="${destUrl}" target="_blank">${destLabel}</a>` : '—';
    return `<tr>
      <td>${i+1}</td>
      <td>${r.departure_time||'—'}</td>
      <td style="text-align:left;max-width:70px;overflow:hidden;white-space:nowrap">${r.departure||'—'}</td>
      <td>${r.arrival_time||'—'}</td>
      <td style="text-align:left;max-width:70px;overflow:hidden;white-space:nowrap">${destCell}</td>
      <td>${dur}</td><td>${dist}</td>
      <td style="font-weight:700">¥${fare.toLocaleString()}</td>
      <td class="${payClass}">${payLabel}</td>
    </tr>`;
  }).join('');
  totalEl.style.display = 'flex';
  document.getElementById('rt-total').textContent    = '¥'+total.toLocaleString();
  document.getElementById('rt-cash').textContent     = '¥'+cash.toLocaleString();
  document.getElementById('rt-cashless').textContent = '¥'+cashless.toLocaleString();
  document.getElementById('rt-comm').textContent     = '¥'+Math.floor(total*0.3).toLocaleString();
}

// タブ切り替え
document.querySelectorAll('.rides-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.rides-tab').forEach(t => {
      t.className = 'rides-tab';
    });
    const car = this.dataset.car;
    const suffix = car.slice(-1); // 'a','b','c'
    this.classList.add(`active-${suffix}`);
    activeRideTab = car;
    fetchTodayRides(car);
  });
});

// 初回取得 + 5秒ごとに自動更新
fetchVehicles();
fetchTodayRides(activeRideTab);
setInterval(() => {
  fetchVehicles();
  fetchTodayRides(activeRideTab);
}, 5000);
</script>
</body>
</html>
