<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A1運転代行 管理画面</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest-manager.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="A1管理">
  <meta name="theme-color" content="#3b82f6">
  <link rel="apple-touch-icon" href="icon-manager.png">
  <link rel="icon" type="image/png" href="icon-manager.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --border: #334155;
      --accent: #3b82f6; --green: #22c55e; --red: #ef4444;
      --yellow: #f59e0b; --text: #f1f5f9; --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system,'Helvetica Neue','Hiragino Sans',sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--card); padding: 10px 16px;
      border-bottom: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
    }
    header h1 { font-size: 15px; font-weight: 700; }
    .conn-badge {
      font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600;
    }
    .conn-ok  { background: rgba(34,197,94,.2);  color: var(--green); }
    .conn-err { background: rgba(239,68,68,.2);  color: var(--red); }
    .conn-off { background: rgba(148,163,184,.15); color: var(--muted); }

    /* マップ */
    #map { height: 320px; z-index: 0; }

    /* 車両パネル */
    .vehicle-panels { display: flex; gap: 8px; padding: 8px; flex-wrap: wrap; }
    .vehicle-card {
      flex: 1; min-width: 150px; background: var(--card);
      border-radius: 12px; padding: 12px 14px;
      border: 2px solid var(--border); transition: border-color .3s;
      position: relative; overflow: hidden;
    }
    .vehicle-card.driving {
      border-color: var(--green);
      animation: drivingPulse 1.5s ease-in-out infinite;
    }
    @keyframes drivingPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
      50%      { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
    }
    .vehicle-card.departing { border-color: var(--yellow); }
    .vehicle-card.hidden-card { display: none; }

    .vc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .vc-name { font-size: 15px; font-weight: 800; }
    .vc-status {
      font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 700;
    }
    .st-waiting   { background: rgba(148,163,184,.2); color: var(--muted); }
    .st-driving   { background: rgba(34,197,94,.2);   color: var(--green); animation: statusBlink 0.8s ease-in-out infinite alternate; }
    .st-departing { background: rgba(245,158,11,.2);  color: var(--yellow); }
    @keyframes statusBlink { from { opacity: 1; } to { opacity: 0.4; } }

    .vc-info { font-size: 12px; color: var(--muted); line-height: 1.8; margin-bottom: 8px; }
    .vc-info span { color: var(--text); font-weight: 600; }

    .vc-metrics { display: flex; gap: 6px; margin-bottom: 8px; }
    .vc-metric {
      flex: 1; background: var(--bg); border-radius: 6px; padding: 6px 8px; text-align: center;
    }
    .vc-metric .val { font-size: 16px; font-weight: 800; }
    .vc-metric .lbl { font-size: 10px; color: var(--muted); }

    .updated { font-size: 10px; color: var(--muted); text-align: right; }

    /* 走行中バナー */
    .driving-banner {
      display: none; background: var(--green); color: #fff;
      text-align: center; font-size: 12px; font-weight: 800;
      padding: 4px 8px; border-radius: 6px; margin-bottom: 6px;
      animation: statusBlink 0.8s ease-in-out infinite alternate;
    }
    .vehicle-card.driving .driving-banner { display: block; }

    /* 配車依頼ボタン */
    .btn-req {
      display: block; width: 100%; padding: 9px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 700;
      cursor: pointer; margin-top: 8px; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-req:active { opacity: 0.8; }
    .btn-req:disabled { opacity: 0.3; }

    /* セクション */
    .section { margin: 10px 8px; background: var(--card); border-radius: 12px; padding: 14px 16px; }
    .section-title {
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; font-weight: 700; margin-bottom: 12px;
    }
    .input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .input-row:last-child { margin-bottom: 0; }
    .input-row label { font-size: 12px; color: var(--muted); width: 60px; flex-shrink: 0; font-weight: 600; }
    .input-row input, .input-row select {
      flex: 1; padding: 9px 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 14px; font-family: inherit;
    }
    .input-row input:focus, .input-row select:focus { outline: none; border-color: var(--accent); }
    select option { background: var(--card); }

    .btn-send {
      display: block; width: 100%; padding: 14px; border: none;
      border-radius: 10px; background: var(--accent); color: #fff;
      font-size: 15px; font-weight: 800; cursor: pointer;
      touch-action: manipulation; margin-top: 12px;
    }
    .btn-send:active { opacity: 0.85; }

    /* 送信済み依頼リスト */
    .req-item {
      padding: 10px 12px; background: var(--bg); border-radius: 8px;
      margin-bottom: 8px; font-size: 12px;
    }
    .req-item:last-child { margin-bottom: 0; }
    .req-car   { font-weight: 800; font-size: 13px; }
    .req-info  { color: var(--muted); margin-top: 2px; }
    .req-status-pending  { color: var(--yellow); font-weight: 700; }
    .req-status-accepted { color: var(--green);  font-weight: 700; }
    .req-status-declined { color: var(--red);    font-weight: 700; }

    /* 乗務記録テーブル */
    .rides-tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .rides-tab {
      padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
      cursor: pointer; border: 1px solid var(--border); background: var(--bg);
      color: var(--muted); touch-action: manipulation;
    }
    .rides-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,.15); }
    .table-wrap { overflow-x: auto; }
    .table-wrap table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .table-wrap th {
      background: var(--bg); padding: 5px 6px; text-align: center;
      color: var(--muted); font-weight: 600; white-space: nowrap;
    }
    .table-wrap td {
      padding: 7px 6px; border-bottom: 1px solid var(--border);
      text-align: center; vertical-align: middle;
    }
    .table-wrap tr:last-child td { border-bottom: none; }
    .table-wrap td a { color: var(--accent); text-decoration: none; }
    .pay-cash     { color: var(--green); font-weight: 700; }
    .pay-cashless { color: #a855f7; font-weight: 700; }
    .rides-total {
      display: flex; gap: 8px; padding: 8px 4px;
      font-size: 12px; border-top: 1px solid var(--border); margin-top: 6px; flex-wrap: wrap;
    }
    .rides-total span { color: var(--muted); }
    .rides-total b { color: var(--text); }

    /* 未出勤メッセージ */
    .no-shift-msg {
      text-align: center; padding: 20px; color: var(--muted); font-size: 13px;
    }

    /* お迎え場所ドロップダウン */
    .pick-wrapper { position: relative; flex: 1; }
    .pick-list {
      position: absolute; top: calc(100% + 2px); left: 0; right: 0;
      background: var(--card); border: 2px solid var(--accent);
      border-radius: 10px; max-height: 200px; overflow-y: auto;
      z-index: 400; box-shadow: 0 6px 20px rgba(0,0,0,.5);
    }
    .pick-list-item {
      padding: 12px 14px; font-size: 13px; border-bottom: 1px solid var(--border);
      cursor: pointer; touch-action: manipulation; user-select: none;
    }
    .pick-list-item:last-child { border-bottom: none; }
    .pick-list-item:active { background: rgba(59,130,246,.2); }
    .map-mini-btn {
      width: 36px; height: 36px; border: none; border-radius: 8px;
      background: var(--accent); color: #fff; font-size: 16px;
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; touch-action: manipulation;
    }
    .admin-link {
      font-size: 12px; font-weight: 700; color: var(--muted);
      text-decoration: none; padding: 4px 10px; border: 1px solid var(--border);
      border-radius: 16px;
    }
    .admin-link:hover { color: var(--text); border-color: var(--text); }
  </style>
</head>
<body>

<header>
  <h1>🗺 A1運転代行 管理画面</h1>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="conn-badge conn-off" id="conn-badge">接続中...</span>
    <a href="admin.html" class="admin-link">⚙️ 管理</a>
  </div>
</header>

<!-- マップ -->
<div id="map"></div>

<!-- 出勤中の車両パネル -->
<div class="vehicle-panels" id="vehicle-panels">
  <!-- 動的に生成 -->
  <div class="no-shift-msg" id="no-shift-msg">本日出勤中の車両はありません</div>
</div>

<!-- 配車依頼フォーム -->
<div class="section">
  <div class="section-title">📨 配車依頼を送る</div>
  <div class="input-row">
    <label>対象車</label>
    <select id="req-car">
      <option value="">出勤中の車を選択</option>
    </select>
  </div>
  <div class="input-row">
    <label>お客様名</label>
    <input type="text" id="req-customer" placeholder="山田 太郎">
  </div>
  <div class="input-row">
    <label>お迎え場所</label>
    <div class="pick-wrapper">
      <input type="text" id="req-pickup" placeholder="▼ タップでリスト / 直接入力OK" autocomplete="off"
             style="padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;width:100%">
      <div id="pickup-list" class="pick-list hidden"></div>
    </div>
    <button type="button" id="pickup-map-btn" class="map-mini-btn" title="地図で確認">🗺</button>
  </div>
  <div class="input-row">
    <label>目的地</label>
    <input type="text" id="req-destination" placeholder="川平方面・○○ホテル">
  </div>
  <div class="input-row">
    <label>メモ</label>
    <input type="text" id="req-note" placeholder="（任意）">
  </div>
  <button class="btn-send" id="btn-send-req">📨 依頼を送信する</button>
</div>

<!-- 送信済み依頼リスト -->
<div class="section">
  <div class="section-title">📋 送信済み依頼</div>
  <div id="req-list">
    <div style="color:var(--muted);font-size:13px;text-align:center;padding:12px">まだ依頼はありません</div>
  </div>
</div>

<!-- 乗務記録 -->
<div class="section">
  <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
    <span>📋 乗務記録</span>
    <input type="date" id="ride-date-input"
      style="background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:13px">
  </div>
  <div class="rides-tabs" id="rides-tabs">
    <!-- 動的に生成 -->
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>#</th><th>お客様</th><th>出発</th><th>出発地</th><th>到着</th><th>目的地</th><th>時間</th><th>距離</th><th>金額</th><th>支払</th><th>備考</th><th>経路</th></tr>
      </thead>
      <tbody id="rides-tbody">
        <tr><td colspan="12" style="color:var(--muted);padding:16px;text-align:center">記録なし</td></tr>
      </tbody>
    </table>
  </div>
  <div class="rides-total" id="rides-total" style="display:none">
    <span>合計：</span><b id="rt-total">¥0</b>
    &nbsp;|&nbsp;<span>現金：</span><b id="rt-cash" style="color:var(--green)">¥0</b>
    &nbsp;|&nbsp;<span>カード等：</span><b id="rt-cashless" style="color:#a855f7">¥0</b>
    &nbsp;|&nbsp;<span>歩合30%：</span><b id="rt-comm" style="color:var(--yellow)">¥0</b>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://mfkqpsmfteiolgeqgnfx.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_NV_AQykUo40ReFLWAuYoHQ_9m-Sn_ql';

const ISHIGAKI_CENTER = [24.3380, 124.1543];

// ============================================================
// 石垣島 駐車場・スポット（スタッフ画面と共通）
// ============================================================
const SPOTS = {
  '蔵元駐車場':{ lat:24.3384,lng:124.1567 },
  '石垣港離島ターミナル第1駐車場':{ lat:24.3367,lng:124.1580 },
  '堤防駐車場':{ lat:24.3350,lng:124.1601 },
  '八島第2駐車場':{ lat:24.3384,lng:124.1603 },
  '石垣島離島ターミナル第2臨時駐車場':{ lat:24.3361,lng:124.1571 },
  '石垣港離島ターミナル第2駐車場':{ lat:24.3370,lng:124.1575 },
  '大川有料駐車場':{ lat:24.3395,lng:124.1538 },
  'まるくに駐車場':{ lat:24.3399,lng:124.1539 },
  'Dパーキング石垣市大川第一':{ lat:24.3393,lng:124.1540 },
  'OGLパーキング':{ lat:24.3397,lng:124.1537 },
  'タケトミタウンパーキング':{ lat:24.3410,lng:124.1551 },
  'アイランドパーキング20石垣島':{ lat:24.3379,lng:124.1562 },
  'akkipa登野城駐車場':{ lat:24.3402,lng:124.1572 },
  'ひとし駐車場':{ lat:24.3393,lng:124.1565 },
  'シーサーパーキング':{ lat:24.3378,lng:124.1567 },
  '石垣島宿泊施設わったー家8・9番駐車場':{ lat:24.3390,lng:124.1560 },
  'サザンゲートブリッジ':{ lat:24.3280,lng:124.1515 },
  'ユーグレナ石垣港離島ターミナル':{ lat:24.3368,lng:124.1583 },
  '石垣市中央運動公園駐車場':{ lat:24.3476,lng:124.1717 },
  '南ぬ島石垣空港':{ lat:24.3964,lng:124.2433 },
  'バンナ公園':{ lat:24.3518,lng:124.1595 },
  '石垣市役所':{ lat:24.3409,lng:124.1551 },
  'マックスバリュ石垣店':{ lat:24.3324,lng:124.1527 },
  'イオンタウン石垣':{ lat:24.3254,lng:124.1582 },
  'ドン・キホーテ石垣店':{ lat:24.3412,lng:124.1553 },
  '川平湾':{ lat:24.4521,lng:124.1444 },
  '米原ビーチ':{ lat:24.4395,lng:124.1760 },
  'フサキビーチ':{ lat:24.3258,lng:124.1106 },
  '底地ビーチ':{ lat:24.3758,lng:124.1095 },
  '白保海岸':{ lat:24.3699,lng:124.2249 },
  'ANAインターコンチネンタル石垣リゾート':{ lat:24.3828,lng:124.1421 },
  'フサキビーチリゾート':{ lat:24.3249,lng:124.1085 },
  'グランヴィリオリゾート石垣島':{ lat:24.3820,lng:124.1432 },
};

// 本日ISO
const todayISO = (() => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
})();

// 車情報
const CAR_DEFS = {
  car_a: { letter: 'A', name: 'MRワゴン', plate: 'も90-39', color: '#3b82f6' },
  car_b: { letter: 'B', name: 'タント',   plate: 'よ95-24', color: '#a855f7' },
  car_c: { letter: 'C', name: 'ムーブ',   plate: 'ゆ83-01', color: '#22c55e' }
};

// ============================================================
// Supabase fetch
// ============================================================
async function sbGet(path) {
  try {
    const r = await fetch(SUPABASE_URL + path, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
    });
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}
async function sbPost(path, body, prefer) {
  try {
    const r = await fetch(SUPABASE_URL + path, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json', 'Prefer': prefer || 'return=representation'
      },
      body: JSON.stringify(body)
    });
    if (!r.ok) return null;
    const t = await r.text();
    return t ? JSON.parse(t) : null;
  } catch(e) { return null; }
}

// ============================================================
// マップ初期化
// ============================================================
const map = L.map('map', { center: ISHIGAKI_CENTER, zoom: 13, zoomControl: true });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap', maxZoom: 19
}).addTo(map);

const markers = {};

function makeMarkerIcon(carId, status) {
  const def = CAR_DEFS[carId];
  const color = def ? def.color : '#888';
  const isDriving = status === 'driving';
  const label = isDriving ? '🚗走行中' : status === 'departing' ? '📍出発' : '⏸待機';
  const glow = isDriving ? `box-shadow:0 0 0 6px ${color}44;` : '';
  return L.divIcon({
    className: '',
    html: `<div style="display:flex;flex-direction:column;align-items:center">
      <div style="width:42px;height:42px;border-radius:50%;background:${color};
        display:flex;align-items:center;justify-content:center;font-size:20px;
        border:3px solid #fff;${glow}">🚗</div>
      <div style="background:rgba(0,0,0,0.8);color:#fff;font-size:10px;font-weight:700;
        padding:2px 6px;border-radius:4px;margin-top:2px;white-space:nowrap">${def ? def.name : carId}・${label}</div>
    </div>`,
    iconSize: [70, 60], iconAnchor: [35, 20]
  });
}

// ============================================================
// 出勤中の車（shifts テーブルから取得）
// ============================================================
let activeShifts = {}; // { car_id: shiftData }  ← status=active のみ
let ridesByCar   = {}; // { car_id: rides[] }    ← 乗務記録用（選択日付のライド）
let activeRideTab = null;

async function fetchActiveShifts() {
  // status=active のシフトのみ取得（出勤中の車のみ表示）
  const data = await sbGet('/rest/v1/shifts?status=eq.active');
  if (!data) return;

  const newActive = {};
  data.forEach(s => { newActive[s.car_id] = s; });
  activeShifts = newActive;

  renderVehiclePanels();
  updateReqCarSelect();
}

// ============================================================
// 乗務記録：日付選択 → rides テーブルを直接検索 → タブ表示
// ============================================================
function initRideDateInput() {
  const input = document.getElementById('ride-date-input');
  input.value = todayISO;
  // 日付変更時はタブをリセット
  input.addEventListener('change', () => fetchRidesForDate(input.value, false));
  fetchRidesForDate(todayISO, false);
}

// rides テーブルを直接検索（シフト経由しない）
// 「今日」は created_at で直近36時間を取得（夜勤シフトの date ズレを回避）
// 過去日付は date カラムで取得
// preserveTab=true のとき現在選択中のタブを維持
async function fetchRidesForDate(date, preserveTab = false) {
  if (!date) return;
  let apiPath;
  if (date === todayISO) {
    // 直近36時間以内に作成されたライドを取得
    const since = new Date(Date.now() - 36 * 60 * 60 * 1000).toISOString();
    apiPath = `/rest/v1/rides?created_at=gte.${since}&order=created_at.asc`;
  } else {
    apiPath = `/rest/v1/rides?date=eq.${date}&order=created_at.asc`;
  }
  const data = await sbGet(apiPath);
  if (!data) return;

  // car_id ごとにグループ化
  ridesByCar = {};
  data.forEach(r => {
    if (!ridesByCar[r.car_id]) ridesByCar[r.car_id] = [];
    ridesByCar[r.car_id].push(r);
  });

  updateRidesTabs(preserveTab);
}

function renderVehiclePanels() {
  const panels = document.getElementById('vehicle-panels');
  const noMsg  = document.getElementById('no-shift-msg');
  const activeIds = Object.keys(activeShifts);

  if (activeIds.length === 0) {
    panels.innerHTML = '';
    panels.appendChild(noMsg);
    noMsg.style.display = '';
    return;
  }
  noMsg.style.display = 'none';

  // 既存カード以外を削除、新規追加
  activeIds.forEach(carId => {
    if (!document.getElementById('card-' + carId)) {
      const def = CAR_DEFS[carId] || {};
      const shift = activeShifts[carId];
      const div = document.createElement('div');
      div.className = 'vehicle-card';
      div.id = 'card-' + carId;
      div.innerHTML = `
        <div class="driving-banner">🚗 走行中！</div>
        <div class="vc-header">
          <div class="vc-name" style="color:${def.color}">${def.name}（${def.plate}）</div>
          <div class="vc-status st-waiting" id="status-${carId}">待機中</div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px">
          ${shift.driver1_name||''}／${shift.driver2_name||''}
          ${shift.date !== todayISO ? `<span style="color:var(--yellow);margin-left:6px">📅 ${shift.date}</span>` : ''}
          ${shift.status === 'ended' ? `<span style="color:var(--red);margin-left:6px">終業済</span>` : ''}
        </div>
        <div class="vc-metrics">
          <div class="vc-metric"><div class="val" id="dist-${carId}">—</div><div class="lbl">km</div></div>
          <div class="vc-metric"><div class="val" id="fare-${carId}">—</div><div class="lbl">円</div></div>
        </div>
        <div class="vc-info" id="info-${carId}">お客様：—<br>目的地：—</div>
        <div class="updated" id="updated-${carId}"></div>
        <button class="btn-req" onclick="openReqFormFor('${carId}')">📨 配車依頼</button>
      `;
      panels.appendChild(div);
    }
    // マーカー初期化
    if (!markers[carId]) {
      markers[carId] = L.marker(ISHIGAKI_CENTER, { icon: makeMarkerIcon(carId, 'waiting') }).addTo(map);
    }
  });

  // 退勤した車のカードを削除
  document.querySelectorAll('[id^="card-car_"]').forEach(card => {
    const carId = card.id.replace('card-', '');
    if (!activeShifts[carId]) {
      card.remove();
      if (markers[carId]) { markers[carId].remove(); delete markers[carId]; }
    }
  });
}

// ============================================================
// 車両データ更新（vehicles テーブル）
// ============================================================
async function fetchVehicles() {
  const data = await sbGet('/rest/v1/vehicles?select=*');
  if (!data) {
    document.getElementById('conn-badge').textContent = '接続エラー';
    document.getElementById('conn-badge').className   = 'conn-badge conn-err';
    return;
  }
  document.getElementById('conn-badge').textContent = '接続中 🟢';
  document.getElementById('conn-badge').className   = 'conn-badge conn-ok';

  data.forEach(row => {
    if (!activeShifts[row.id]) return; // 出勤中でない車はスキップ
    updateVehicleCard(row.id, row);
  });
}

function updateVehicleCard(carId, data) {
  const status = data.status || 'waiting';
  const dist   = data.distance != null ? parseFloat(data.distance).toFixed(2) : '—';
  const fare   = data.fare     != null ? parseInt(data.fare).toLocaleString()  : '—';
  const updAt  = data.updated_at
    ? new Date(data.updated_at).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit',second:'2-digit'})
    : '';

  const stMap = { waiting: ['待機中','st-waiting'], departing: ['出発','st-departing'], driving: ['走行中','st-driving'] };
  const [stLabel, stClass] = stMap[status] || ['不明','st-waiting'];

  const statusEl  = document.getElementById('status-' + carId);
  const distEl    = document.getElementById('dist-'   + carId);
  const fareEl    = document.getElementById('fare-'   + carId);
  const infoEl    = document.getElementById('info-'   + carId);
  const updatedEl = document.getElementById('updated-'+ carId);
  const card      = document.getElementById('card-'   + carId);

  if (!statusEl || !card) return;

  statusEl.textContent  = stLabel;
  statusEl.className    = 'vc-status ' + stClass;
  distEl.textContent    = dist;
  fareEl.textContent    = fare;
  infoEl.innerHTML      = `お客様：<span>${data.customer_name||'—'}</span><br>目的地：<span>${data.destination||'—'}</span>`;
  updatedEl.textContent = updAt ? `更新 ${updAt}` : '';

  card.classList.remove('driving', 'departing');
  if (status === 'driving')   card.classList.add('driving');
  if (status === 'departing') card.classList.add('departing');

  // マーカー更新
  if (markers[carId]) {
    if (data.lat && data.lng) markers[carId].setLatLng([data.lat, data.lng]);
    markers[carId].setIcon(makeMarkerIcon(carId, status));
  }
}

// ============================================================
// 配車依頼
// ============================================================
function openReqFormFor(carId) {
  document.getElementById('req-car').value = carId;
  document.getElementById('req-customer').focus();
  document.getElementById('req-car').scrollIntoView({ behavior: 'smooth' });
}

function updateReqCarSelect() {
  const sel = document.getElementById('req-car');
  const current = sel.value;
  sel.innerHTML = '<option value="">出勤中の車を選択</option>';
  Object.keys(activeShifts).forEach(carId => {
    const def = CAR_DEFS[carId] || {};
    const opt = document.createElement('option');
    opt.value = carId;
    opt.textContent = `${def.name}（${def.plate}）`;
    sel.appendChild(opt);
  });
  if (current) sel.value = current;
}

async function sendRequest() {
  const carId   = document.getElementById('req-car').value;
  const cust    = document.getElementById('req-customer').value.trim();
  const pickup  = document.getElementById('req-pickup').value.trim();
  const dest    = document.getElementById('req-destination').value.trim();
  const note    = document.getElementById('req-note').value.trim();
  if (!carId)  { alert('対象の車を選択してください'); return; }
  if (!pickup) { alert('お迎え場所を入力してください'); return; }

  const btn = document.getElementById('btn-send-req');
  btn.disabled = true; btn.textContent = '送信中...';

  await sbPost('/rest/v1/requests', {
    car_id: carId, customer_name: cust, pickup, destination: dest, note, status: 'pending'
  }, 'return=minimal');

  btn.disabled = false; btn.textContent = '📨 依頼を送信する';
  ['req-customer','req-pickup','req-destination','req-note'].forEach(id => {
    document.getElementById(id).value = '';
  });
  await fetchRequests();
}

// 依頼リスト表示
let reqList = [];

async function fetchRequests() {
  const data = await sbGet(`/rest/v1/requests?order=created_at.desc&limit=20`);
  if (!data) return;
  reqList = data;
  renderReqList();
}

function renderReqList() {
  const el = document.getElementById('req-list');
  if (!reqList || reqList.length === 0) {
    el.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:12px">まだ依頼はありません</div>';
    return;
  }
  el.innerHTML = reqList.map(r => {
    const def = CAR_DEFS[r.car_id] || {};
    const statusMap = {
      pending:  ['⏳ 待機中', 'req-status-pending'],
      accepted: ['✅ 受理済み', 'req-status-accepted'],
      declined: ['✗ 見送り',  'req-status-declined']
    };
    const [stLabel, stClass] = statusMap[r.status] || ['—',''];
    const time = r.created_at
      ? new Date(r.created_at).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})
      : '';
    return `<div class="req-item">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="req-car" style="color:${def.color||'var(--text)'}">${def.name||r.car_id}</span>
        <span class="${stClass}">${stLabel}</span>
      </div>
      <div class="req-info">
        ${time}　お客様：${r.customer_name||'—'}　場所：${r.pickup||'—'}　→　${r.destination||'—'}
        ${r.note ? '<br>メモ：'+r.note : ''}
      </div>
      ${r.status === 'accepted' ? `<div style="font-size:11px;color:var(--green);margin-top:4px">✅ 次の行先：${r.destination||'未設定'}</div>` : ''}
    </div>`;
  }).join('');
}

// ============================================================
// 乗務記録
// ============================================================
function updateRidesTabs(preserveTab = false) {
  const tabsEl = document.getElementById('rides-tabs');
  tabsEl.innerHTML = '';
  const ids = Object.keys(ridesByCar);

  if (ids.length === 0) {
    renderRidesTable([]);
    activeRideTab = null;
    return;
  }

  // 現在のタブが引き続き存在すれば維持、なければ最初のタブへ
  const targetTab = (preserveTab && activeRideTab && ridesByCar[activeRideTab])
    ? activeRideTab
    : ids[0];

  ids.forEach(carId => {
    const def = CAR_DEFS[carId] || {};
    const cnt = (ridesByCar[carId] || []).length;
    const tab = document.createElement('div');
    tab.className = 'rides-tab' + (carId === targetTab ? ' active' : '');
    tab.dataset.car = carId;
    tab.textContent = `🚗 ${def.name}（${cnt}件）`;
    tab.addEventListener('click', function() {
      document.querySelectorAll('.rides-tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      activeRideTab = this.dataset.car;
      renderRidesTable(ridesByCar[activeRideTab] || []);
    });
    tabsEl.appendChild(tab);
  });

  activeRideTab = targetTab;
  renderRidesTable(ridesByCar[activeRideTab] || []);
}


function renderRidesTable(rides) {
  const tbody   = document.getElementById('rides-tbody');
  const totalEl = document.getElementById('rides-total');
  if (!rides || rides.length === 0) {
    tbody.innerHTML = '<tr><td colspan="12" style="color:var(--muted);padding:16px;text-align:center">記録なし</td></tr>';
    totalEl.style.display = 'none';
    return;
  }
  let total = 0, cash = 0, cashless = 0;
  tbody.innerHTML = rides.map((r, i) => {
    const fare = r.fare || 0;
    total += fare; if (r.payment_type === 'cash') cash += fare; else cashless += fare;
    const payClass = r.payment_type === 'cash' ? 'pay-cash' : 'pay-cashless';
    const payLabel = r.payment_type === 'cash' ? '現金' : 'カード等';
    const dist = r.distance > 0 ? parseFloat(r.distance).toFixed(1)+'km' : '—';
    const dur  = r.duration_min > 0 ? r.duration_min+'分' : '—';
    // お客様名
    const custCell = r.customer_name
      ? `<span style="font-size:11px;max-width:60px;display:inline-block;overflow:hidden;white-space:nowrap;vertical-align:middle">${r.customer_name}</span>`
      : '—';
    // 出発地リンク
    const depUrl = r.departure_lat
      ? `https://maps.google.com/?q=${r.departure_lat},${r.departure_lng}`
      : `https://maps.google.com/?q=${encodeURIComponent('石垣島 '+(r.departure||''))}`;
    const depCell = r.departure ? `<a href="${depUrl}" target="_blank">${r.departure}</a>` : '—';
    // 到着地リンク
    const destLabel = r.arrival_place || r.destination || '—';
    const destUrl = r.arrival_lat
      ? `https://maps.google.com/?q=${r.arrival_lat},${r.arrival_lng}`
      : `https://maps.google.com/?q=${encodeURIComponent('石垣島 '+(r.destination||''))}`;
    const destCell = destLabel !== '—' ? `<a href="${destUrl}" target="_blank">${destLabel}</a>` : '—';
    // 備考（クリックでポップアップ）
    const notesCell = r.notes
      ? `<span style="cursor:pointer;font-size:16px" title="${r.notes.replace(/"/g,'&quot;')}"
             onclick="alert('【備考】\\n${r.notes.replace(/'/g,"\\'").replace(/\n/g,'\\n')}')">📝</span>`
      : '—';
    // 経路
    const routeUrl = (r.departure_lat && r.arrival_lat)
      ? `https://maps.google.com/maps/dir/${r.departure_lat},${r.departure_lng}/${r.arrival_lat},${r.arrival_lng}`
      : `https://maps.google.com/maps/dir/${encodeURIComponent(r.departure||'石垣島')}/${encodeURIComponent(r.arrival_place||r.destination||'')}`;
    const hasRoute = r.arrival_lat || r.destination || r.arrival_place;
    return `<tr>
      <td>${i+1}</td>
      <td style="max-width:60px">${custCell}</td>
      <td>${r.departure_time||'—'}</td>
      <td style="text-align:left;max-width:60px;overflow:hidden;white-space:nowrap">${depCell}</td>
      <td>${r.arrival_time||'—'}</td>
      <td style="text-align:left;max-width:60px;overflow:hidden;white-space:nowrap">${destCell}</td>
      <td>${dur}</td><td>${dist}</td>
      <td style="font-weight:700">¥${fare.toLocaleString()}</td>
      <td class="${payClass}">${payLabel}</td>
      <td>${notesCell}</td>
      <td>${hasRoute ? `<a href="${routeUrl}" target="_blank">🗺</a>` : '—'}</td>
    </tr>`;
  }).join('');
  totalEl.style.display = 'flex';
  document.getElementById('rt-total').textContent    = '¥'+total.toLocaleString();
  document.getElementById('rt-cash').textContent     = '¥'+cash.toLocaleString();
  document.getElementById('rt-cashless').textContent = '¥'+cashless.toLocaleString();
  document.getElementById('rt-comm').textContent     = '¥'+Math.floor(total*0.3).toLocaleString();
}

// ============================================================
// 初期化・ポーリング
// ============================================================
document.getElementById('btn-send-req').addEventListener('click', sendRequest);

async function poll() {
  await fetchActiveShifts();
  await fetchVehicles();
  await fetchRequests();
  // 選択中の日付が今日の場合：シフト情報ごと再取得（タブ選択は維持）
  // 過去日付の場合：ポーリングしない（手動更新のみ）
  const rideDate = document.getElementById('ride-date-input').value;
  if (rideDate === todayISO) await fetchRidesForDate(todayISO, true);
}

// ============================================================
// お迎え場所カスタムドロップダウン
// ============================================================
function initPickupDropdown() {
  const input = document.getElementById('req-pickup');
  const list  = document.getElementById('pickup-list');
  const allSpots = Object.keys(SPOTS);
  let touchStartY = 0, touchMoved = false;

  function renderList(filter) {
    const q = (filter||'').trim();
    const items = q ? allSpots.filter(s => s.includes(q)) : allSpots;
    if (items.length === 0) { list.classList.add('hidden'); return; }
    list.innerHTML = items.map(s => `<div class="pick-list-item">${s}</div>`).join('');
    list.classList.remove('hidden');
  }
  list.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; touchMoved = false; }, { passive:true });
  list.addEventListener('touchmove',  e => { if (Math.abs(e.touches[0].clientY - touchStartY) > 8) touchMoved = true; }, { passive:true });
  list.addEventListener('touchend', e => {
    if (touchMoved) return;
    const item = e.target.closest('.pick-list-item');
    if (!item) return;
    e.preventDefault();
    input.value = item.textContent;
    list.classList.add('hidden'); input.blur();
  });
  list.addEventListener('mousedown', e => {
    const item = e.target.closest('.pick-list-item');
    if (!item) return;
    e.preventDefault();
    input.value = item.textContent;
    list.classList.add('hidden');
  });
  input.addEventListener('focus', () => renderList(input.value));
  input.addEventListener('click', () => renderList(input.value));
  input.addEventListener('input', () => renderList(input.value));
  input.addEventListener('blur',  () => setTimeout(() => list.classList.add('hidden'), 300));

  // マップボタン
  document.getElementById('pickup-map-btn').addEventListener('click', () => {
    const name = input.value.trim();
    const spot = SPOTS[name];
    const url = spot
      ? `https://maps.google.com/?q=${spot.lat},${spot.lng}`
      : `https://maps.google.com/search/?q=${encodeURIComponent('石垣島 ' + (name||'駐車場'))}`;
    window.open(url, '_blank');
  });
}

// 初回
initPickupDropdown();
initRideDateInput();
poll();
// 5秒ごと
setInterval(poll, 5000);
</script>
