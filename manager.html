<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A1運転代行 管理画面</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest-manager.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="A1管理">
  <meta name="theme-color" content="#3b82f6">
  <link rel="apple-touch-icon" href="icon-manager.png">
  <link rel="icon" type="image/png" href="icon-manager.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --border: #334155;
      --accent: #3b82f6; --green: #22c55e; --red: #ef4444;
      --yellow: #f59e0b; --text: #f1f5f9; --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system,'Helvetica Neue','Hiragino Sans',sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--card); padding: 10px 16px;
      border-bottom: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
    }
    header h1 { font-size: 15px; font-weight: 700; }
    .conn-badge {
      font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600;
    }
    .conn-ok  { background: rgba(34,197,94,.2);  color: var(--green); }
    .conn-err { background: rgba(239,68,68,.2);  color: var(--red); }
    .conn-off { background: rgba(148,163,184,.15); color: var(--muted); }

    /* マップ */
    #map-container { position: relative; }
    #map { height: 320px; z-index: 0; transition: height .3s ease; }
    #map-fullscreen-btn {
      position: absolute; bottom: 10px; right: 10px; z-index: 1000;
      background: rgba(15,23,42,.88); color: #fff; border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 700;
      cursor: pointer; touch-action: manipulation; backdrop-filter: blur(4px);
    }

    /* 車両パネル */
    .vehicle-panels { display: flex; gap: 8px; padding: 8px; flex-wrap: wrap; }
    .vehicle-card {
      flex: 1; min-width: 150px; background: var(--card);
      border-radius: 12px; padding: 12px 14px;
      border: 2px solid var(--border); transition: border-color .3s;
      position: relative; overflow: hidden;
    }
    .vehicle-card.driving {
      border-color: var(--green);
      animation: drivingPulse 1.5s ease-in-out infinite;
    }
    @keyframes drivingPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
      50%      { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
    }
    .vehicle-card.departing { border-color: var(--yellow); }
    .vehicle-card.hidden-card { display: none; }

    .vc-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px; gap: 6px;
    }
    .vc-name { font-size: 15px; font-weight: 800; flex: 1; min-width: 0; display: flex; align-items: center; gap: 6px; overflow: visible; }
    .vc-status {
      font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }
    .st-waiting    { background: rgba(148,163,184,.2); color: var(--muted); }
    .st-driving    { background: rgba(34,197,94,.2);   color: var(--green); animation: statusBlink 0.8s ease-in-out infinite alternate; }
    .st-dispatched { background: rgba(245,158,11,.2);  color: var(--yellow); animation: statusBlink 1.2s ease-in-out infinite alternate; }
    @keyframes statusBlink { from { opacity: 1; } to { opacity: 0.4; } }

    .vc-info { font-size: 12px; color: var(--muted); line-height: 1.8; margin-bottom: 6px; }
    .vc-info span { color: var(--text); font-weight: 600; }

    .vc-metrics { display: flex; gap: 6px; margin-bottom: 6px; }
    .vc-metric { flex: 1; background: var(--bg); border-radius: 6px; padding: 5px 8px; text-align: center; }
    .vc-metric .val { font-size: 15px; font-weight: 800; }
    .vc-metric .lbl { font-size: 10px; color: var(--muted); }

    .updated { font-size: 10px; color: var(--muted); text-align: right; }

    /* 乗務記録ボタン（カード内） */
    .btn-rides-popup {
      display: block; width: 100%;
      background: rgba(59,130,246,.15); color: var(--accent);
      border: 1px solid rgba(59,130,246,.35);
      border-radius: 7px; padding: 6px 10px; font-size: 12px; font-weight: 700;
      cursor: pointer; touch-action: manipulation; text-align: center;
      margin-bottom: 8px;
    }
    .btn-rides-popup:active { background: rgba(59,130,246,.3); }

    /* 乗務記録ポップアップ */
    #rides-modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.72);
      z-index: 2000; backdrop-filter: blur(3px); align-items: flex-end;
    }
    #rides-modal-overlay.active { display: flex; }
    #rides-modal {
      background: var(--card); border-radius: 18px 18px 0 0;
      width: 100%; max-height: 88vh; overflow-y: auto; padding: 16px;
      animation: slideUp .22s ease;
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    #rides-modal-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px;
    }
    #rides-modal-title { font-size: 15px; font-weight: 800; flex: 1; }
    .btn-modal-close {
      background: var(--red); color: #fff; border: none; border-radius: 8px;
      padding: 7px 16px; font-size: 13px; font-weight: 700; cursor: pointer;
    }

    /* 配車依頼ボタン */
    .btn-req {
      display: block; width: 100%; padding: 9px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 700;
      cursor: pointer; margin-top: 8px; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-req:active { opacity: 0.8; }
    .btn-req:disabled { opacity: 0.3; }

    /* セクション */
    .section { margin: 10px 8px; background: var(--card); border-radius: 12px; padding: 14px 16px; }
    .section-title {
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; font-weight: 700; margin-bottom: 12px;
    }
    .input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .input-row:last-child { margin-bottom: 0; }
    .input-row label { font-size: 12px; color: var(--muted); width: 60px; flex-shrink: 0; font-weight: 600; }
    .input-row input, .input-row select {
      flex: 1; padding: 9px 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 14px; font-family: inherit;
    }
    .input-row input:focus, .input-row select:focus { outline: none; border-color: var(--accent); }
    select option { background: var(--card); }

    .btn-send {
      display: block; width: 100%; padding: 14px; border: none;
      border-radius: 10px; background: var(--accent); color: #fff;
      font-size: 15px; font-weight: 800; cursor: pointer;
      touch-action: manipulation; margin-top: 12px;
    }
    .btn-send:active { opacity: 0.85; }

    /* 送信済み依頼リスト */
    .req-item {
      padding: 10px 12px; background: var(--bg); border-radius: 8px;
      margin-bottom: 8px; font-size: 12px;
    }
    .req-item:last-child { margin-bottom: 0; }
    .req-car   { font-weight: 800; font-size: 13px; }
    .req-info  { color: var(--muted); margin-top: 2px; }
    .req-status-pending  { color: var(--yellow); font-weight: 700; }
    .req-status-accepted { color: var(--green);  font-weight: 700; }
    .req-status-declined { color: var(--red);    font-weight: 700; }

    /* 乗務記録テーブル */
    .rides-tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .rides-tab {
      padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
      cursor: pointer; border: 1px solid var(--border); background: var(--bg);
      color: var(--muted); touch-action: manipulation;
    }
    .rides-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,.15); }
    .table-wrap { overflow-x: auto; }
    .table-wrap table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .table-wrap th {
      background: var(--bg); padding: 5px 6px; text-align: center;
      color: var(--muted); font-weight: 600; white-space: nowrap;
    }
    .table-wrap td {
      padding: 7px 6px; border-bottom: 1px solid var(--border);
      text-align: center; vertical-align: middle;
    }
    .table-wrap tr:last-child td { border-bottom: none; }
    .table-wrap td a { color: var(--accent); text-decoration: none; }
    .pay-cash     { color: var(--green); font-weight: 700; }
    .pay-cashless { color: #a855f7; font-weight: 700; }
    .rides-total {
      display: flex; gap: 8px; padding: 8px 4px;
      font-size: 12px; border-top: 1px solid var(--border); margin-top: 6px; flex-wrap: wrap;
    }
    .rides-total span { color: var(--muted); }
    .rides-total b { color: var(--text); }

    /* 未出勤メッセージ */
    .no-shift-msg {
      text-align: center; padding: 20px; color: var(--muted); font-size: 13px;
    }

    /* お迎え場所ドロップダウン */
    .pick-wrapper { position: relative; flex: 1; }
    .pick-list {
      position: absolute; top: calc(100% + 2px); left: 0; right: 0;
      background: var(--card); border: 2px solid var(--accent);
      border-radius: 10px; max-height: 200px; overflow-y: auto;
      z-index: 400; box-shadow: 0 6px 20px rgba(0,0,0,.5);
    }
    .pick-list-item {
      padding: 12px 14px; font-size: 13px; border-bottom: 1px solid var(--border);
      cursor: pointer; touch-action: manipulation; user-select: none;
    }
    .pick-list-item:last-child { border-bottom: none; }
    .pick-list-item:active { background: rgba(59,130,246,.2); }
    .map-mini-btn {
      width: 36px; height: 36px; border: none; border-radius: 8px;
      background: var(--accent); color: #fff; font-size: 16px;
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; touch-action: manipulation;
    }
    .admin-link {
      font-size: 12px; font-weight: 700; color: var(--muted);
      text-decoration: none; padding: 4px 10px; border: 1px solid var(--border);
      border-radius: 16px;
    }
    .admin-link:active { opacity: .7; }
    .hidden { display: none !important; }

    /* お迎えマップピッカー */
    #modal-pickup-map {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.82); z-index: 3000;
      align-items: flex-end;
    }
    #modal-pickup-map.open { display: flex; }
    #pickup-map-inner { height: 300px; border-radius: 10px; overflow: hidden; }

    /* ============================================================
       レスポンシブ（スマホ対応）
       ============================================================ */

    /* 車両パネル：スマホでは1列 */
    @media (max-width: 520px) {
      .vehicle-panels { flex-direction: column; gap: 6px; padding: 6px; }
      .vehicle-card { min-width: unset; width: 100%; }

      /* セクション余白を詰める */
      .section { margin: 6px 6px; padding: 12px 14px; }

      /* 配車依頼フォームのラベル幅 */
      .input-row label { width: 72px; font-size: 12px; }
      .input-row input, .input-row select { font-size: 16px; } /* iOS zoom防止 */

      /* 送信ボタン */
      .btn-send { padding: 16px; font-size: 16px; }

      /* 送信済み依頼 */
      .req-item { font-size: 13px; }
      .req-info { font-size: 12px; line-height: 1.7; }
    }

    /* 乗務記録テーブル：横スクロール（スマホ対応） */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-wrap table { min-width: 560px; } /* 横スクロール確保 */

    /* 乗務記録モーダルヘッダー：スマホで折り返し */
    @media (max-width: 480px) {
      #rides-modal-header { flex-wrap: wrap; gap: 6px; }
      #rides-modal-title { font-size: 14px; width: 100%; }
      #rides-modal { padding: 14px 12px; }
      .btn-modal-close { padding: 8px 14px; font-size: 12px; }
    }

    /* 乗務記録合計：スマホで折り返し */
    @media (max-width: 420px) {
      .rides-total { flex-wrap: wrap; gap: 4px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🗺 A1運転代行 管理画面</h1>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="conn-badge conn-off" id="conn-badge">接続中...</span>
    <button onclick="location.reload()"
      style="background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.4);
             color:var(--accent);border-radius:8px;padding:5px 12px;font-size:12px;
             font-weight:700;cursor:pointer;white-space:nowrap;
             touch-action:manipulation;-webkit-tap-highlight-color:transparent">
      🔄 更新
    </button>
    <a href="admin.html" class="admin-link">⚙️ 管理</a>
  </div>
</header>

<!-- マップ -->
<div id="map-container">
  <div id="map"></div>
  <button id="map-fullscreen-btn" onclick="toggleMapFullscreen()">⛶ 全画面</button>
</div>

<!-- 出勤中の車両パネル -->
<div class="vehicle-panels" id="vehicle-panels">
  <!-- 動的に生成 -->
  <div class="no-shift-msg" id="no-shift-msg">本日出勤中の車両はありません</div>
</div>

<!-- 配車依頼フォーム -->
<div class="section">
  <div class="section-title">📨 配車依頼を送る</div>
  <div class="input-row">
    <label>対象車</label>
    <select id="req-car">
      <option value="">出勤中の車を選択</option>
    </select>
  </div>
  <div class="input-row">
    <label>お客様名</label>
    <input type="text" id="req-customer" placeholder="山田 太郎">
  </div>
  <div class="input-row">
    <label>お迎え場所</label>
    <div class="pick-wrapper">
      <input type="text" id="req-pickup" placeholder="▼ タップでリスト / 直接入力OK" autocomplete="off"
             style="padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;width:100%">
      <div id="pickup-list" class="pick-list hidden"></div>
    </div>
    <button type="button" id="pickup-map-btn" class="map-mini-btn" title="地図で確認">🗺</button>
  </div>
  <div class="input-row">
    <label>目的地</label>
    <input type="text" id="req-destination" placeholder="川平方面・○○ホテル">
  </div>
  <div class="input-row">
    <label>メモ</label>
    <input type="text" id="req-note" placeholder="（任意）">
  </div>
  <button class="btn-send" id="btn-send-req">📨 依頼を送信する</button>
</div>

<!-- 送信済み依頼リスト -->
<div class="section">
  <div class="section-title">📋 依頼送信済み</div>
  <div id="req-list">
    <div style="color:var(--muted);font-size:13px;text-align:center;padding:12px">まだ依頼はありません</div>
  </div>
</div>

<!-- 乗務記録ポップアップモーダル -->
<div id="rides-modal-overlay">
  <div id="rides-modal">
    <div id="rides-modal-header">
      <div id="rides-modal-title">📋 乗務記録</div>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="date" id="ride-date-input"
          style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:13px">
        <button class="btn-modal-close" onclick="closeRidesPopup()">✕ 閉じる</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>#</th><th>お客様</th><th>出発</th><th>出発地</th><th>到着</th><th>目的地</th><th>時間</th><th>距離</th><th>金額</th><th>支払</th><th>備考</th><th>経路</th><th>操作</th></tr>
        </thead>
        <tbody id="rides-modal-tbody">
          <tr><td colspan="13" style="color:var(--muted);padding:16px;text-align:center">記録なし</td></tr>
        </tbody>
      </table>
    </div>
    <div class="rides-total" id="rides-modal-total" style="display:none">
      <span>合計：</span><b id="rmt-total">¥0</b>
      &nbsp;|&nbsp;<span>現金：</span><b id="rmt-cash" style="color:var(--green)">¥0</b>
      &nbsp;|&nbsp;<span>カード等：</span><b id="rmt-cashless" style="color:#a855f7">¥0</b>
      &nbsp;|&nbsp;<span>歩合30%：</span><b id="rmt-comm" style="color:var(--yellow)">¥0</b>
    </div>
  </div>
</div>

<!-- ====================================================
     お迎え場所 マップピッカーモーダル
     ==================================================== -->
<div id="modal-pickup-map">
  <div style="background:var(--card);border-radius:18px 18px 0 0;width:100%;padding:16px;max-height:90vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:15px;font-weight:800">📍 お迎え場所を選択</div>
      <button onclick="closePickupMapPicker()"
        style="background:none;border:none;color:var(--text);font-size:26px;cursor:pointer;line-height:1;padding:0">✕</button>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px;text-align:center">
      地図をタップ・クリックしてお迎え場所にピンを立ててください
    </div>
    <div id="pickup-map-inner"></div>
    <div id="pickup-map-addr"
      style="margin:10px 0 4px;font-size:13px;font-weight:600;color:var(--text);
             text-align:center;min-height:22px;line-height:1.5">
      —
    </div>
    <div id="pickup-map-coords"
      style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px">
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="confirmPickupMap()"
        style="flex:2;padding:14px;background:var(--accent);color:#fff;border:none;
               border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;
               touch-action:manipulation">
        📍 この場所に決定
      </button>
      <button onclick="closePickupMapPicker()"
        style="flex:1;padding:14px;background:#475569;color:#fff;border:none;
               border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;
               touch-action:manipulation">
        キャンセル
      </button>
    </div>
  </div>
</div>

<script>

// ============================================================
// Supabase fetch

async function sbGet(path) {
  try {
    const r = await fetch(SUPABASE_URL + path, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
    });
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}
async function sbPost(path, body, prefer) {
  try {
    const r = await fetch(SUPABASE_URL + path, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json', 'Prefer': prefer || 'return=representation'
      },
      body: JSON.stringify(body)
    });
    if (!r.ok) return null;
    const t = await r.text();
    return t ? JSON.parse(t) : null;
  } catch(e) { return null; }
}
async function sbPatch(path, body) {
  try {
    const r = await fetch(SUPABASE_URL + path, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    return r.ok;
  } catch(e) { return false; }
}
async function sbDelete(path) {
  try {
    const r = await fetch(SUPABASE_URL + path, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Prefer': 'return=minimal'
      }
    });
    return r.ok;
  } catch(e) { return false; }
}

// 車アイコン生成（実車PNG画像）
function getCarSvg(carId, w, h) {
  const src = CAR_IMAGES[carId];
  if (src) {
    return `<img src="${src}" width="${w}" height="${h}"
      style="object-fit:contain;display:block;" alt="${CAR_DEFS[carId]?.name || carId}"/>`;
  }
  return `<span style="font-size:20px">🚗</span>`;
}

function makeMarkerIcon(carId, status) {
  const def = CAR_DEFS[carId];
  const color = def ? def.color : '#888';
  const isDriving = status === 'driving' || status === 'departing';
  const label = isDriving ? '配車中' : '待機';
  const shadow = isDriving
    ? `filter:drop-shadow(0 0 6px ${color}) drop-shadow(0 0 3px ${color});`
    : `filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));`;
  return L.divIcon({
    className: '',
    html: `<div style="display:flex;flex-direction:column;align-items:center">
      <div style="${shadow}">${getCarSvg(carId, 66, 37)}</div>
      <div style="background:rgba(0,0,0,0.85);color:#fff;font-size:10px;font-weight:700;
        padding:2px 6px;border-radius:4px;margin-top:1px;white-space:nowrap;
        ${isDriving ? `border:1px solid ${color};` : ''}">${def ? def.name : carId}・${label}</div>
    </div>`,
    iconSize: [80, 60], iconAnchor: [40, 20]
  });
}

  input.addEventListener('change', () => fetchRidesForDate(input.value, false));
  fetchRidesForDate(todayISO, false);

// 昨日のISO日付
function yesterdayISO() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// rides テーブルを直接検索（date フィールドで取得）
// 今日の場合：今日＋昨日の両方を対象（夜勤シフトの date ズレを回避）
async function fetchRidesForDate(date, preserveTab = false) {
  if (!date) return;
  let apiPath;
  if (date === todayISO) {
    // 今日と昨日（深夜シフト対応）の両方を取得
    apiPath = `/rest/v1/rides?date=in.(${todayISO},${yesterdayISO()})&order=created_at.asc`;
  } else {
    apiPath = `/rest/v1/rides?date=eq.${date}&order=created_at.asc`;
  }
  const data = await sbGet(apiPath);
  // 取得失敗時は空配列扱い（既存データは保持しない）
  const rows = data || [];

  // car_id ごとにグループ化
  ridesByCar = {};
  rows.forEach(r => {
    if (!ridesByCar[r.car_id]) ridesByCar[r.car_id] = [];
    ridesByCar[r.car_id].push(r);
  });

  updateRidesTabs(preserveTab);
}

async function fetchVehicles() {
  const data = await sbGet('/rest/v1/vehicles?select=*');
  if (!data) {
    document.getElementById('conn-badge').textContent = '接続エラー';
    document.getElementById('conn-badge').className   = 'conn-badge conn-err';
    return;
  }
  document.getElementById('conn-badge').textContent = '接続中 🟢';
  document.getElementById('conn-badge').className   = 'conn-badge conn-ok';

  data.forEach(row => {
    if (!activeShifts[row.id]) return; // 出勤中でない車はスキップ
    updateVehicleCard(row.id, row);
  });
}

function updateVehicleCard(carId, data) {
  const status = data.status || 'waiting';
  const updAt  = data.updated_at
    ? new Date(data.updated_at).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit',second:'2-digit'})
    : '';

  // ステータス表示：待機中 / 配車中（departing or driving）
  const isDispatched = (status === 'driving' || status === 'departing');
  const stLabel = isDispatched ? '配車中' : '待機中';
  const stClass = isDispatched
    ? (status === 'driving' ? 'st-driving' : 'st-dispatched')
    : 'st-waiting';

  const statusEl      = document.getElementById('status-'       + carId);
  const infoEl        = document.getElementById('info-'         + carId);
  const drivingInfoEl = document.getElementById('driving-info-' + carId);
  const waitingInfoEl = document.getElementById('waiting-info-' + carId);
  const distEl        = document.getElementById('dist-'         + carId);
  const fareEl        = document.getElementById('fare-'         + carId);
  const updatedEl     = document.getElementById('updated-'      + carId);
  const card          = document.getElementById('card-'         + carId);

  if (!statusEl || !card) return;

  statusEl.textContent = stLabel;
  statusEl.className   = 'vc-status ' + stClass;
  updatedEl.textContent = updAt ? `更新 ${updAt}` : '';

  if (isDispatched) {
    // 配車中：お客様名・目的地を表示
    if (infoEl) infoEl.innerHTML = `お客様：<span>${data.customer_name||'—'}</span><br>目的地：<span>${data.destination||'—'}</span>`;
    if (drivingInfoEl) drivingInfoEl.style.display = '';
    if (waitingInfoEl) waitingInfoEl.style.display = 'none';
  } else {
    // 待機中：お客様名・目的地を非表示、距離・金額を表示（到着後の値）
    if (drivingInfoEl) drivingInfoEl.style.display = 'none';
    if (waitingInfoEl) {
      waitingInfoEl.style.display = '';
      const dist = data.distance != null && data.distance > 0
        ? parseFloat(data.distance).toFixed(2) : '—';
      const fare = data.fare != null && data.fare > 0
        ? parseInt(data.fare).toLocaleString() : '—';
      if (distEl) distEl.textContent = dist;
      if (fareEl) fareEl.textContent = fare;
    }
  }

  card.classList.remove('driving', 'departing');
  if (status === 'driving')   card.classList.add('driving');
  if (status === 'departing') card.classList.add('departing');

  // マーカー更新
  if (markers[carId]) {
    if (data.lat && data.lng) markers[carId].setLatLng([data.lat, data.lng]);
    markers[carId].setIcon(makeMarkerIcon(carId, status));
  }
}

// ============================================================
// 強制退勤（管理者が手動でシフト終了）
// ============================================================
async function forceEndShift(carId) {
  const def = CAR_DEFS[carId] || {};
  if (!confirm(`${def.name} を退勤させますか？\n（ドライバーアプリ側の操作に関わらずシフトを終了します）`)) return;
  const shift = activeShifts[carId];
  // shiftsテーブルのstatusをendedに
  if (shift && shift.id) {
    await sbPatch(`/rest/v1/shifts?id=eq.${shift.id}`, { status: 'ended' });
  } else {
    // shiftのidが不明な場合はcar_idで絞り込む
    await sbPatch(`/rest/v1/shifts?car_id=eq.${carId}&status=eq.active`, { status: 'ended' });
  }
  // vehiclesテーブルのstatusをwaitingにリセット
  await sbPatch(`/rest/v1/vehicles?id=eq.${carId}`, { status: 'waiting', updated_at: new Date().toISOString() });
  // 画面を更新（カードが消える）
  await fetchActiveShifts();
}

async function sendRequest() {
  const carId   = document.getElementById('req-car').value;
  const cust    = document.getElementById('req-customer').value.trim();
  const pickup  = document.getElementById('req-pickup').value.trim();
  const dest    = document.getElementById('req-destination').value.trim();
  const note    = document.getElementById('req-note').value.trim();
  if (!carId)  { alert('対象の車を選択してください'); return; }
  if (!pickup) { alert('お迎え場所を入力してください'); return; }

  const btn = document.getElementById('btn-send-req');
  btn.disabled = true; btn.textContent = '送信中...';

  await sbPost('/rest/v1/requests', {
    car_id: carId, customer_name: cust, pickup, destination: dest, note, status: 'pending'
  }, 'return=minimal');

  btn.disabled = false; btn.textContent = '📨 依頼を送信する';
  ['req-customer','req-pickup','req-destination','req-note'].forEach(id => {
    document.getElementById(id).value = '';
  });
  await fetchRequests();
}

    : '—';
  const routeUrl  = (r.departure_lat && r.arrival_lat)
    ? `https://maps.google.com/maps/dir/${r.departure_lat},${r.departure_lng}/${r.arrival_lat},${r.arrival_lng}`
    : `https://maps.google.com/maps/dir/${encodeURIComponent(r.departure||'石垣島')}/${encodeURIComponent(r.arrival_place||r.destination||'')}`;
  const hasRoute  = r.arrival_lat || r.destination || r.arrival_place;
  const ec = (v) => v === '—' ? ' class="td-empty"' : ''; // 空セルは非表示
  return `<tr>
    <td data-label="#">${i+1}</td>
    <td data-label="お客様"${ec(custText)}>${custText}</td>
    <td data-label="出発時刻">${r.departure_time||'—'}</td>
    <td data-label="出発地" style="text-align:right"${ec(r.departure?'x':'—')}>${depCell}</td>
    <td data-label="到着時刻">${r.arrival_time||'—'}</td>
    <td data-label="目的地" style="text-align:right"${ec(destLabel)}>${destCell}</td>
    <td data-label="時間"${ec(dur)}>${dur}</td>
    <td data-label="距離"${ec(dist)}>${dist}</td>
    <td data-label="金額" style="font-weight:700">¥${fare.toLocaleString()}</td>
    <td data-label="支払" class="${payClass}">${payLabel}</td>
    <td data-label="備考"${ec(r.notes?'x':'—')}>${notesCell}</td>
    <td data-label="経路"${ec(hasRoute?'x':'—')}>${hasRoute ? `<a href="${routeUrl}" target="_blank">🗺</a>` : '—'}</td>
    <td><button onclick="deleteRide('${r.id}')"
      style="background:rgba(239,68,68,.2);color:#f87171;border:1px solid rgba(239,68,68,.3);
             border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;
             touch-action:manipulation;white-space:nowrap">🗑</button></td>
  </tr>`;
}

function renderRidesModalTable(rides) {
  const tbody   = document.getElementById('rides-modal-tbody');
  const totalEl = document.getElementById('rides-modal-total');
  if (!rides || rides.length === 0) {
    tbody.innerHTML = '<tr><td colspan="13" style="color:var(--muted);padding:16px;text-align:center">記録なし</td></tr>';
    if (totalEl) totalEl.style.display = 'none';
    return;
  }
  let total = 0, cash = 0, cashless = 0;
  tbody.innerHTML = rides.map((r, i) => {
    const fare = r.fare || 0;
    total += fare;
    if (r.payment_type === 'cash') cash += fare; else cashless += fare;
    return buildRideRow(r, i);
  }).join('');
  if (totalEl) {
    totalEl.style.display = 'flex';
    document.getElementById('rmt-total').textContent    = '¥'+total.toLocaleString();
    document.getElementById('rmt-cash').textContent     = '¥'+cash.toLocaleString();
    document.getElementById('rmt-cashless').textContent = '¥'+cashless.toLocaleString();
    document.getElementById('rmt-comm').textContent     = '¥'+Math.floor(total*0.3).toLocaleString();
  }
}

// ============================================================
// お迎え場所 マップピッカー
// ============================================================
let pickupMapInstance = null;
let pickupMarker      = null;
let pickupPickedLat   = null;
let pickupPickedLng   = null;

function openPickupMapPicker() {
  document.getElementById('modal-pickup-map').classList.add('open');

  // Leaflet マップ初期化（初回のみ）
  if (!pickupMapInstance) {
    pickupMapInstance = L.map('pickup-map-inner', {
      center: ISHIGAKI_CENTER, zoom: 14, zoomControl: true
    });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap', maxZoom: 19
    }).addTo(pickupMapInstance);

    pickupMapInstance.on('click', async (e) => {
      pickupPickedLat = e.latlng.lat;
      pickupPickedLng = e.latlng.lng;

      // マーカー更新
      if (pickupMarker) pickupMarker.remove();
      pickupMarker = L.marker([pickupPickedLat, pickupPickedLng]).addTo(pickupMapInstance);

      document.getElementById('pickup-map-addr').textContent   = '住所取得中...';
      document.getElementById('pickup-map-coords').textContent =
        `${pickupPickedLat.toFixed(5)}, ${pickupPickedLng.toFixed(5)}`;

      // 逆ジオコーディング
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=json&lat=${pickupPickedLat}&lon=${pickupPickedLng}&accept-language=ja`,
          { headers: { 'User-Agent': 'A1DrivingService/1.0' } }
        );
        const d = await res.json();
        const a = d.address || {};
        const short = a.neighbourhood || a.suburb || a.city_district
                   || a.town || a.road || d.display_name?.split(',')[0] || '';
        document.getElementById('pickup-map-addr').textContent =
          short || `${pickupPickedLat.toFixed(5)}, ${pickupPickedLng.toFixed(5)}`;
      } catch(e) {
        document.getElementById('pickup-map-addr').textContent =
          `${pickupPickedLat.toFixed(5)}, ${pickupPickedLng.toFixed(5)}`;
      }
    });
  }

  // 既存入力があればそこにマップを合わせる（SPOTS に一致する場合）
  const curVal = document.getElementById('req-pickup').value.trim();
  if (curVal && SPOTS[curVal]) {
    pickupMapInstance.setView([SPOTS[curVal].lat, SPOTS[curVal].lng], 16);
  }

  setTimeout(() => pickupMapInstance.invalidateSize(), 250);
}

function confirmPickupMap() {
  if (pickupPickedLat === null) {
    alert('地図をタップしてお迎え場所を選んでください'); return;
  }
  const addr = document.getElementById('pickup-map-addr').textContent;
  document.getElementById('req-pickup').value = addr || `${pickupPickedLat.toFixed(5)},${pickupPickedLng.toFixed(5)}`;
  closePickupMapPicker();
}

function closePickupMapPicker() {
  document.getElementById('modal-pickup-map').classList.remove('open');
}

// ============================================================
// お迎え場所カスタムドロップダウン
// ============================================================
function initPickupDropdown() {
  const input = document.getElementById('req-pickup');
  const list  = document.getElementById('pickup-list');
  const allSpots = Object.keys(SPOTS);
  let touchStartY = 0, touchMoved = false;

  function renderList(filter) {
    const q = (filter||'').trim();
    const items = q ? allSpots.filter(s => s.includes(q)) : allSpots;
    if (items.length === 0) { list.classList.add('hidden'); return; }
    list.innerHTML = items.map(s => `<div class="pick-list-item">${s}</div>`).join('');
    list.classList.remove('hidden');
  }
  list.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; touchMoved = false; }, { passive:true });
  list.addEventListener('touchmove',  e => { if (Math.abs(e.touches[0].clientY - touchStartY) > 8) touchMoved = true; }, { passive:true });
  list.addEventListener('touchend', e => {
    if (touchMoved) return;
    const item = e.target.closest('.pick-list-item');
    if (!item) return;
    e.preventDefault();
    input.value = item.textContent;
    list.classList.add('hidden'); input.blur();
  });
  list.addEventListener('mousedown', e => {
    const item = e.target.closest('.pick-list-item');
    if (!item) return;
    e.preventDefault();
    input.value = item.textContent;
    list.classList.add('hidden');
  });
  input.addEventListener('focus', () => renderList(input.value));
  input.addEventListener('click', () => renderList(input.value));
  input.addEventListener('input', () => renderList(input.value));
  input.addEventListener('blur',  () => setTimeout(() => list.classList.add('hidden'), 300));

  // マップボタン → ピッカー起動
  document.getElementById('pickup-map-btn').addEventListener('click', () => {
    openPickupMapPicker();
  });
}

// 初回
initPickupDropdown();
initRideDateInput();
poll();
// 3秒ごとにリアルタイム更新
setInterval(poll, 3000);
