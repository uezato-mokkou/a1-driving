<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>石垣島運転代行 スタッフ</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --accent: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --line: #06c755;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }
    header {
      background: var(--card);
      padding: 14px 20px;
      text-align: center;
      border-bottom: 2px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 17px; font-weight: 700; }
    header p { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .section {
      background: var(--card);
      margin: 10px 12px;
      border-radius: 12px;
      padding: 14px 16px;
    }
    .section-title {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .radio-group { display: flex; gap: 8px; }
    .radio-btn {
      flex: 1;
      padding: 10px 4px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      line-height: 1.4;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .radio-btn small { font-size: 10px; font-weight: 400; display: block; }
    .radio-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(59,130,246,0.1);
    }
    .radio-btn.active-green {
      border-color: var(--green);
      color: var(--green);
      background: rgba(34,197,94,0.1);
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .input-row:last-child { margin-bottom: 0; }
    .input-row label {
      font-size: 12px;
      color: var(--muted);
      width: 52px;
      flex-shrink: 0;
      font-weight: 600;
    }
    .input-row input {
      flex: 1;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
    }
    .input-row input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .metrics-row {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 12px;
    }
    .metric-block {
      flex: 1;
      text-align: center;
      padding: 8px 0;
    }
    .metric-value {
      font-size: 56px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
    }
    .metric-unit {
      font-size: 18px;
      font-weight: 400;
      color: var(--muted);
      margin-left: 2px;
    }
    .metric-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .metrics-divider {
      width: 1px;
      height: 60px;
      background: var(--border);
    }

    .gps-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--bg);
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .gps-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .gps-dot.active {
      background: var(--green);
      animation: blink 1.2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .btn {
      display: block;
      width: calc(100% - 24px);
      margin: 8px 12px;
      padding: 22px;
      border: none;
      border-radius: 14px;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 2px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: transform 0.1s, opacity 0.1s;
      -webkit-appearance: none;
      appearance: none;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }
    .btn:disabled { opacity: 0.35; pointer-events: none; }
    .btn-start { background: var(--green); color: #fff; }
    .btn-stop { background: var(--red); color: #fff; }
    .btn-line { background: var(--line); color: #fff; font-size: 16px; }
    .btn-depart { background: var(--yellow); color: #000; font-size: 16px; }

    .hidden { display: none !important; }

    .fare-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      margin-left: 8px;
    }
    .fare-badge.general { background: #f59e0b; color: #000; }
    .fare-badge.local { background: #22c55e; color: #000; }

    .status-bar {
      background: var(--card);
      margin: 10px 12px;
      border-radius: 12px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .status-waiting { background: rgba(148,163,184,0.2); color: var(--muted); }
    .status-driving { background: rgba(34,197,94,0.2); color: var(--green); }

    .result-card {
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 8px;
    }
    .result-card .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .result-card .row:last-child { margin-bottom: 0; }
    .result-card .row span:first-child { color: var(--muted); }
    .result-card .row span:last-child { font-weight: 600; }
    .result-card .total-fare {
      text-align: center;
      font-size: 36px;
      font-weight: 800;
      color: var(--yellow);
      margin: 10px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>石垣島運転代行 スタッフ</h1>
  <p id="header-status">待機中</p>
</header>

<!-- 車両・料金選択 -->
<div class="section" id="setup-section">
  <div class="section-title">車両選択</div>
  <div class="radio-group" style="margin-bottom:14px">
    <div class="radio-btn active" id="btn-car-a">
      🚗 車A
    </div>
    <div class="radio-btn" id="btn-car-b">
      🚗 車B
    </div>
  </div>

  <div class="section-title">料金タイプ</div>
  <div class="radio-group">
    <div class="radio-btn active" id="btn-fare-general">
      一般
      <small>観光客向け</small>
    </div>
    <div class="radio-btn" id="btn-fare-local">
      地元割
      <small>地元割引</small>
    </div>
  </div>
</div>

<!-- お客様情報 -->
<div class="section" id="customer-section">
  <div class="section-title">お客様情報</div>
  <div class="input-row">
    <label>お名前</label>
    <input type="text" id="customer-name" placeholder="例：山田 太郎" autocomplete="off">
  </div>
  <div class="input-row">
    <label>出発地</label>
    <input type="text" id="departure" placeholder="例：港周辺・居酒屋○○" autocomplete="off">
  </div>
  <div class="input-row">
    <label>目的地</label>
    <input type="text" id="destination" placeholder="例：市街地・川平方面" autocomplete="off">
  </div>
</div>

<!-- 距離・料金 -->
<div class="section">
  <div class="metrics-row">
    <div class="metric-block">
      <div class="metric-value" id="dist-val">0.00<span class="metric-unit">km</span></div>
      <div class="metric-label">走行距離</div>
    </div>
    <div class="metrics-divider"></div>
    <div class="metric-block">
      <div class="metric-value" id="fare-val">0<span class="metric-unit">円</span></div>
      <div class="metric-label">料金</div>
    </div>
  </div>
  <div class="gps-status">
    <div class="gps-dot" id="gps-dot"></div>
    <span id="gps-text">GPS: 待機中</span>
  </div>
</div>

<!-- メインボタン -->
<button class="btn btn-depart" id="btn-depart">📍 出発を社長に報告</button>
<button class="btn btn-start" id="btn-start">▶ 計測スタート</button>
<button class="btn btn-stop hidden" id="btn-stop">■ 到着・計測ストップ</button>

<!-- 到着後の表示 -->
<div class="section hidden" id="result-section">
  <div class="section-title">走行結果</div>
  <div class="result-card" id="result-card"></div>
</div>
<button class="btn btn-line hidden" id="btn-line">📱 LINEで到着報告</button>
<button class="btn btn-start hidden" id="btn-reset" style="background:#475569; font-size:15px; padding:16px; letter-spacing:0">
  次のお客様へリセット
</button>

<script>
// ================================================
// ★ Supabase設定（設定後に使用可能になります）
// ================================================
const SUPABASE_URL  = 'https://mfkqpsmfteiolgeqgnfx.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_NV_AQykUo40ReFLWAuYoHQ_9m-Sn_ql';

// ================================================
// 状態管理
// ================================================
let selectedCar  = 'A';
let selectedFare = 'general';
let isTracking   = false;
let watchId      = null;
let totalDist    = 0;
let lastPos      = null;
let sendTimer    = null;
let currentLat   = null;
let currentLng   = null;

// ================================================
// 料金計算
// ================================================
function calcLocalFare(km) {
  // 0~1.9km=1400, 2km~: 1400+(floor(km)-1)*200
  if (km < 2) return 1400;
  return 1400 + (Math.floor(km) - 1) * 200;
}

function calcGeneralFare(km) {
  // 0~4.9km: 1900+floor(km)*200
  // 5~20.9km: 3000+(floor(km)-5)*300
  // 21~41.9km: 7900+(floor(km)-21)*400
  const k = Math.floor(km);
  if (km < 5)  return 1900 + k * 200;
  if (km < 21) return 3000 + (k - 5) * 300;
  return 7900 + (k - 21) * 400;
}

function calcFare(km) {
  return selectedFare === 'local' ? calcLocalFare(km) : calcGeneralFare(km);
}

// ================================================
// Haversine距離計算
// ================================================
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
            Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ================================================
// UI操作
// ================================================
function selectCar(car) {
  if (isTracking) return;
  selectedCar = car;
  document.getElementById('btn-car-a').className = 'radio-btn' + (car === 'A' ? ' active' : '');
  document.getElementById('btn-car-b').className = 'radio-btn' + (car === 'B' ? ' active' : '');
}

function selectFare(type) {
  if (isTracking) return;
  selectedFare = type;
  document.getElementById('btn-fare-general').className = 'radio-btn' + (type === 'general' ? ' active' : '');
  document.getElementById('btn-fare-local').className   = 'radio-btn' + (type === 'local'   ? ' active' : '');
  updateDisplay();
}

function updateDisplay() {
  const fare = calcFare(totalDist);
  document.getElementById('dist-val').innerHTML =
    `${totalDist.toFixed(2)}<span class="metric-unit">km</span>`;
  document.getElementById('fare-val').innerHTML =
    `${fare.toLocaleString()}<span class="metric-unit">円</span>`;
}

// ================================================
// 出発報告（計測前に社長へ通知）
// ================================================
function notifyDepart() {
  const name = document.getElementById('customer-name').value || '（未入力）';
  const dep  = document.getElementById('departure').value    || '（未入力）';
  const dest = document.getElementById('destination').value  || '（未入力）';
  const time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
  const fareType = selectedFare === 'general' ? '一般' : '地元割';

  const msg = `【出発】車${selectedCar} ${time}\nお客様：${name}\n出発：${dep}\n目的地：${dest}\n料金区分：${fareType}`;
  window.open(`https://line.me/R/msg/text/${encodeURIComponent(msg)}`, '_blank');

  pushStatus('departing');
}

// ================================================
// 計測スタート
// ================================================
function startDriving() {
  if (!navigator.geolocation) {
    alert('このブラウザはGPSに対応していません。\nSafariまたはChromeで開いてください。');
    return;
  }

  totalDist  = 0;
  lastPos    = null;
  isTracking = true;

  document.getElementById('btn-start').classList.add('hidden');
  document.getElementById('btn-depart').classList.add('hidden');
  document.getElementById('btn-stop').classList.remove('hidden');
  document.getElementById('btn-line').classList.add('hidden');
  document.getElementById('btn-reset').classList.add('hidden');
  document.getElementById('result-section').classList.add('hidden');
  document.getElementById('setup-section').style.pointerEvents = 'none';
  document.getElementById('setup-section').style.opacity = '0.5';
  document.getElementById('gps-dot').classList.add('active');
  document.getElementById('gps-text').textContent = 'GPS: 取得中...';
  document.getElementById('header-status').textContent = '計測中';

  watchId = navigator.geolocation.watchPosition(onPosition, onGpsError, {
    enableHighAccuracy: true,
    maximumAge: 3000,
    timeout: 15000
  });

  pushStatus('driving');
  sendTimer = setInterval(() => {
    if (currentLat) pushLocation(currentLat, currentLng);
  }, 5000);
}

// ================================================
// 計測ストップ
// ================================================
function stopDriving() {
  isTracking = false;

  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  if (sendTimer) {
    clearInterval(sendTimer);
    sendTimer = null;
  }

  document.getElementById('btn-stop').classList.add('hidden');
  document.getElementById('btn-start').classList.add('hidden');
  document.getElementById('btn-depart').classList.add('hidden');
  document.getElementById('btn-line').classList.remove('hidden');
  document.getElementById('btn-reset').classList.remove('hidden');
  document.getElementById('gps-dot').classList.remove('active');
  document.getElementById('gps-text').textContent = `GPS: 完了（${totalDist.toFixed(2)}km）`;
  document.getElementById('header-status').textContent = '到着';

  showResult();

  pushStatus('waiting');
}

// ================================================
// 結果表示
// ================================================
function showResult() {
  const fare     = calcFare(totalDist);
  const fareType = selectedFare === 'general' ? '一般' : '地元割';
  const name     = document.getElementById('customer-name').value || '（未入力）';
  const dep      = document.getElementById('departure').value    || '（未入力）';
  const dest     = document.getElementById('destination').value  || '（未入力）';
  const time     = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});

  document.getElementById('result-card').innerHTML = `
    <div class="total-fare">${fare.toLocaleString()}円</div>
    <div class="row"><span>料金区分</span><span>${fareType}</span></div>
    <div class="row"><span>走行距離</span><span>${totalDist.toFixed(2)} km</span></div>
    <div class="row"><span>お客様</span><span>${name}</span></div>
    <div class="row"><span>出発地</span><span>${dep}</span></div>
    <div class="row"><span>目的地</span><span>${dest}</span></div>
    <div class="row"><span>到着時刻</span><span>${time}</span></div>
  `;
  document.getElementById('result-section').classList.remove('hidden');
}

// ================================================
// LINE報告
// ================================================
function sendLineReport() {
  const fare     = calcFare(totalDist);
  const fareType = selectedFare === 'general' ? '一般' : '地元割';
  const name     = document.getElementById('customer-name').value || '（未入力）';
  const dep      = document.getElementById('departure').value    || '（未入力）';
  const dest     = document.getElementById('destination').value  || '（未入力）';
  const time     = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});

  const msg = `【到着報告】車${selectedCar} ${time}\nお客様：${name}\n出発：${dep}\n到着：${dest}\n距離：${totalDist.toFixed(2)}km\n料金：${fare.toLocaleString()}円（${fareType}）`;
  window.open(`https://line.me/R/msg/text/${encodeURIComponent(msg)}`, '_blank');
}

// ================================================
// リセット
// ================================================
function resetAll() {
  totalDist  = 0;
  lastPos    = null;
  isTracking = false;
  currentLat = null;
  currentLng = null;

  updateDisplay();

  document.getElementById('customer-name').value = '';
  document.getElementById('departure').value     = '';
  document.getElementById('destination').value   = '';
  document.getElementById('btn-start').classList.remove('hidden');
  document.getElementById('btn-depart').classList.remove('hidden');
  document.getElementById('btn-line').classList.add('hidden');
  document.getElementById('btn-reset').classList.add('hidden');
  document.getElementById('result-section').classList.add('hidden');
  document.getElementById('setup-section').style.pointerEvents = '';
  document.getElementById('setup-section').style.opacity = '';
  document.getElementById('gps-dot').classList.remove('active');
  document.getElementById('gps-text').textContent = 'GPS: 待機中';
  document.getElementById('header-status').textContent = '待機中';
}

// ================================================
// GPS コールバック
// ================================================
function onPosition(pos) {
  const { latitude, longitude, accuracy } = pos.coords;
  currentLat = latitude;
  currentLng = longitude;

  document.getElementById('gps-text').textContent =
    `GPS: 計測中（精度 ±${Math.round(accuracy)}m）`;

  if (lastPos && isTracking) {
    const d = haversine(lastPos.lat, lastPos.lng, latitude, longitude);
    // 精度100m未満かつ1回移動0.5km未満のみ加算（異常値除去）
    if (accuracy < 100 && d < 0.5) {
      totalDist += d;
      updateDisplay();
    }
  }
  lastPos = { lat: latitude, lng: longitude };
}

function onGpsError(err) {
  const msgs = {
    1: 'GPS許可が拒否されています。ブラウザの設定で位置情報を許可してください。',
    2: 'GPS信号を取得できません。屋外で試してください。',
    3: 'GPSタイムアウト。再度お試しください。'
  };
  document.getElementById('gps-text').textContent =
    `GPS エラー: ${msgs[err.code] || err.message}`;
  document.getElementById('gps-dot').classList.remove('active');
}

// ================================================
// Supabase送信（plain fetch）
// ================================================
async function supabaseFetch(data) {
  try {
    await fetch(SUPABASE_URL + '/rest/v1/vehicles', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify(data)
    });
  } catch(e) {}
}

async function pushLocation(lat, lng) {
  await supabaseFetch({
    id: 'car_' + selectedCar.toLowerCase(),
    vehicle_name: '車' + selectedCar,
    lat, lng,
    status: 'driving',
    distance: totalDist,
    fare: calcFare(totalDist),
    customer_name: document.getElementById('customer-name').value,
    departure:     document.getElementById('departure').value,
    destination:   document.getElementById('destination').value,
    updated_at: new Date().toISOString()
  });
}

async function pushStatus(status) {
  await supabaseFetch({
    id: 'car_' + selectedCar.toLowerCase(),
    vehicle_name: '車' + selectedCar,
    status,
    distance: totalDist,
    fare: calcFare(totalDist),
    updated_at: new Date().toISOString()
  });
}

// ================================================
// イベントリスナー（onclick属性より確実）
// ================================================
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('btn-car-a').addEventListener('click', function() { selectCar('A'); });
  document.getElementById('btn-car-b').addEventListener('click', function() { selectCar('B'); });
  document.getElementById('btn-fare-general').addEventListener('click', function() { selectFare('general'); });
  document.getElementById('btn-fare-local').addEventListener('click', function() { selectFare('local'); });
  document.getElementById('btn-depart').addEventListener('click', notifyDepart);
  document.getElementById('btn-start').addEventListener('click', startDriving);
  document.getElementById('btn-stop').addEventListener('click', stopDriving);
  document.getElementById('btn-line').addEventListener('click', sendLineReport);
  document.getElementById('btn-reset').addEventListener('click', resetAll);
});
</script>
</body>
</html>
